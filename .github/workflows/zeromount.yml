name: 🏗️ Build Kernel (SUSFS + ZeroMount s5e8535 / M14 - Clang 22)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: 🏗️ Build Kernel (s5e8535 / M14)
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      KERNEL_REPO_OWNER: MrPankaj24
      KERNEL_REPO_NAME: kernel_common_modifications
      
      # ABI & KMI Settings
      ABI_DEFINITION: ""
      KMI_SYMBOL_LIST_STRICT_MODE: "0"
      SKIP_ABI_CHECKS: "1"
      KMI_ENFORCE: "0"

      # Device & Toolchain variables
      DEVICE: m14x
      ARCH: arm64
      SUBARCH: arm64
      CC: "ccache clang-22"
      HOSTCC: "ccache clang-22"
      LLVM: "1"
      LTO: thin
      LLVM_IAS: "1"
      TARGET_SOC: s5e8535
      SOC_NAME: s5e8535
      DTC_FLAGS: "-@"
      PLATFORM_VERSION: "15"
      ANDROID_MAJOR_VERSION: "t"
      DEPMOD: depmod

      # Path Mapping
      KERNEL_ROOT: ${{ github.workspace }}/kernel_common
      OUTDIR: ${{ github.workspace }}/kernel_common/out
      MODULES_OUTDIR: ${{ github.workspace }}/kernel_common/modules_out
      FINAL_STAGING: ${{ github.workspace }}/staging
      IN_DLKM: ${{ github.workspace }}/kernel_common/backups/modules

      # Cross/clang settings
      CROSS_COMPILE: aarch64-linux-gnu-
      CCACHE_DIR: ${{ github.workspace }}/.ccache
      CCACHE_MAXSIZE: 5G

    steps:
      - name: Checkout Workflow Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Clone Kernel Source & Inject SukiSU
        run: |
          git clone --depth=1 https://github.com/${{ env.KERNEL_REPO_OWNER }}/${{ env.KERNEL_REPO_NAME }}.git kernel_common
          cd kernel_common
          rm -rf KernelSU
          echo "Cloning ReSukiSU..."
          git clone https://github.com/ReSukiSU/ReSukiSU.git KernelSU

      - name: Download & Apply ZeroMount / SUSFS Patches
        run: |
          # 1. Download Patches
          mkdir -p patches
          cd patches
          wget https://raw.githubusercontent.com/MrPankaj24/SM-M146B-Kernel-custom/main/temp/60_zeromount-android13-5.15.patch
          wget https://raw.githubusercontent.com/MrPankaj24/SM-M146B-Kernel-custom/main/temp/70_ksu_safety-resukisu-5.15.patch
          wget https://raw.githubusercontent.com/MrPankaj24/SM-M146B-Kernel-custom/main/temp/65_zeromount-adb-filter-android13-5.15.patch
          cd ../kernel_common
          
          # 2. Manual stat.c Injection & Base Patch
          echo "Manually injecting CONFIG_ZEROMOUNT into fs/stat.c..."
          awk '/#ifdef CONFIG_KSU_SUSFS/ { print "#ifdef CONFIG_ZEROMOUNT"; print "    /* Try ZeroMount hook for relative paths */"; print "    if (filename) {"; print "        int zm_ret = zeromount_stat_hook(dfd, filename, stat, request_mask, flags);"; print "        if (zm_ret != -ENOENT)"; print "            return zm_ret;"; print "    }"; print "#endif"; print "" } {print}' fs/stat.c > fs/stat_tmp.c && mv fs/stat_tmp.c fs/stat.c
          patch -p1 < ../patches/60_zeromount-android13-5.15.patch
          
          # 3. ADB Filter Patch
          patch -p1 -N < ../patches/65_zeromount-adb-filter-android13-5.15.patch || true
          
          # 4. Clean up rejects
          find . -name "*.rej" -type f -delete
          find . -name "*.orig" -type f -delete
          
          # 5. KernelSU Safety Patch
          cd KernelSU
          patch -p1 < ../../patches/70_ksu_safety-resukisu-5.15.patch

      - name: Setup LLVM 22 and Install Dependencies
        run: |
          set -euo pipefail
          sudo apt-get update -y
          curl -fsSL https://apt.llvm.org/llvm-snapshot.gpg.key | sudo gpg --dearmor -o /usr/share/keyrings/llvm-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/llvm-archive-keyring.gpg] http://apt.llvm.org/noble/ llvm-toolchain-noble-22 main" | sudo tee /etc/apt/sources.list.d/llvm.list
          sudo apt-get update -y
          sudo apt-get install -y --no-install-recommends \
            clang-22 llvm-22 lld-22 build-essential make bc libncurses-dev bison flex \
            python3 python3-setuptools python-is-python3 git ccache rsync \
            libssl-dev libelf-dev dwarves device-tree-compiler \
            file gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu sudo lz4 zstd cpio
          mkdir -p "${CCACHE_DIR}"
          ccache -M "${CCACHE_MAXSIZE}" || true
          sudo ln -sf /usr/bin/clang-22 /usr/bin/clang || true
          sudo ln -sf /usr/bin/clang++-22 /usr/bin/clang++ || true

      - name: Cache Compiler Output (ccache)
        uses: actions/cache@v4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ${{ runner.os }}-ccache-${{ hashFiles('.github/workflows/build.yml') }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-ccache-

      - name: Prepare Workspace Directories
        run: |
          rm -rf "${OUTDIR}" "${MODULES_OUTDIR}" "${FINAL_STAGING}"
          mkdir -p "${OUTDIR}" "${MODULES_OUTDIR}" "${FINAL_STAGING}/lib/modules/0.0" "${IN_DLKM}"
          if [ ! -f "${IN_DLKM}/modules.load" ]; then echo "# placeholder modules.load" > "${IN_DLKM}/modules.load"; fi

      - name: Inject Custom Kernel Name (custom.config)
        run: |
          cd "${KERNEL_ROOT}"
          CONFIG_FILE=$(find . -name "custom.config" | head -n 1)
          if [ -n "$CONFIG_FILE" ]; then
            sed -i 's/CONFIG_LOCALVERSION=".*/CONFIG_LOCALVERSION="-MrPankaj24"/g' "$CONFIG_FILE"
            sed -i 's/#CONFIG_DEFAULT_HOSTNAME=".*/#CONFIG_DEFAULT_HOSTNAME="mrpankaj24"/g' "$CONFIG_FILE"
          fi    

      - name: Inject ZeroMount & SUSFS Configurations (su.config)
        run: |
          cd "${KERNEL_ROOT}"
          CONFIG_FILE=$(find . -name "su.config" | head -n 1)
          
          if [ -n "$CONFIG_FILE" ]; then
            echo "Appending ZeroMount and SUSFS configs to $CONFIG_FILE..."
            cat << 'EOF' >> "$CONFIG_FILE"
          
          # --- Kernel SU & Hooks ---
          CONFIG_KPROBES=y
          CONFIG_KPROBE_EVENTS=y
          CONFIG_HAVE_KPROBES=y
          CONFIG_KSU_TRACEPOINT_HOOK=n
          CONFIG_KSU_MANUAL_HOOK=y
          CONFIG_KSU=y
          CONFIG_KSU_MULTI_MANAGER_SUPPORT=y
          CONFIG_KALLSYMS=y
          CONFIG_KALLSYMS_ALL=y
          
          # --- SUSFS & ZeroMount Base ---
          CONFIG_KSU_SUSFS=y
          CONFIG_KSU_SUSFS_SUS_OVERLAYFS=y
          CONFIG_KSU_SUSFS_SUS_MAP=y
          CONFIG_KSU_SUSFS_SUS_PATH=y
          CONFIG_KSU_SUSFS_SUS_MOUNT=y
          CONFIG_KSU_SUSFS_SUS_KSTAT=y
          CONFIG_KSU_SUSFS_SUS_KSTAT_REDIRECT=y
          CONFIG_KSU_SUSFS_AUTO_ADD_SUS_KSU_DEFAULT_MOUNT=y
          CONFIG_KSU_SUSFS_AUTO_ADD_SUS_BIND_MOUNT=y
          CONFIG_KSU_SUSFS_TRY_UMOUNT=y
          CONFIG_KSU_SUSFS_AUTO_ADD_TRY_UMOUNT_FOR_BIND_MOUNT=y
          CONFIG_KSU_SUSFS_SPOOF_UNAME=y
          CONFIG_KSU_SUSFS_ENABLE_LOG=y
          CONFIG_KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS=y
          CONFIG_KSU_SUSFS_SPOOF_CMDLINE_OR_BOOTCONFIG=y
          CONFIG_KSU_SUSFS_OPEN_REDIRECT=y
          CONFIG_KSU_SUSFS_UNICODE_FILTER=y
          CONFIG_KSU_SUSFS_HIDDEN_NAME=y
          CONFIG_KSU_SUSFS_HARDENED=y
          
          # --- Networking / IP Tables (ZeroMount) ---
          CONFIG_IP_NF_TARGET_TTL=y
          CONFIG_IP6_NF_TARGET_HL=y
          CONFIG_IP6_NF_MATCH_HL=y
          CONFIG_TCP_CONG_ADVANCED=y
          CONFIG_TCP_CONG_BBR=y
          CONFIG_NET_SCH_FQ=y
          CONFIG_TCP_CONG_CUBIC=y
          CONFIG_TCP_CONG_BIC=n
          CONFIG_TCP_CONG_WESTWOOD=y
          CONFIG_TCP_CONG_HTCP=y
          CONFIG_IP_SET=y
          CONFIG_IP_SET_MAX=65534
          CONFIG_IP_SET_BITMAP_IP=y
          CONFIG_IP_SET_BITMAP_IPMAC=y
          CONFIG_IP_SET_BITMAP_PORT=y
          CONFIG_IP_SET_HASH_IP=y
          CONFIG_IP_SET_HASH_IPMARK=y
          CONFIG_IP_SET_HASH_IPPORT=y
          CONFIG_IP_SET_HASH_IPPORTIP=y
          CONFIG_IP_SET_HASH_IPPORTNET=y
          CONFIG_IP_SET_HASH_IPMAC=y
          CONFIG_IP_SET_HASH_MAC=y
          CONFIG_IP_SET_HASH_NETPORTNET=y
          CONFIG_IP_SET_HASH_NET=y
          CONFIG_IP_SET_HASH_NETNET=y
          CONFIG_IP_SET_HASH_NETPORT=y
          CONFIG_IP_SET_HASH_NETIFACE=y
          CONFIG_IP_SET_LIST_SET=y
          
          # --- ZRAM Configs ---
          CONFIG_ZSMALLOC=y
          CONFIG_ZRAM=y
          CONFIG_ZRAM_WRITEBACK=y
          CONFIG_CRYPTO_LZO=y
          CONFIG_CRYPTO_LZ4=y
          CONFIG_CRYPTO_LZ4HC=y
          CONFIG_CRYPTO_LZ4K=y
          CONFIG_CRYPTO_LZ4KD=y
          CONFIG_CRYPTO_842=y
          CONFIG_CRYPTO_LZ4K_OPLUS=y
          CONFIG_ZRAM_DEF_COMP_LZ4KD=y
          
          # --- OverlayFS ---
          CONFIG_TMPFS_XATTR=y
          CONFIG_TMPFS_POSIX_ACL=y
          
          # --- Samsung Defex Disable ---
          CONFIG_UH=n
          CONFIG_RKP=n
          CONFIG_KDP=n
          CONFIG_SECURITY_DEFEX=n
          CONFIG_PROCA=n
          CONFIG_FIVE=n
          
          # --- Module Loading ---
          CONFIG_MODULES=y
          CONFIG_MODULE_FORCE_LOAD=y
          CONFIG_MODULE_UNLOAD=y
          CONFIG_MODULE_FORCE_UNLOAD=y
          CONFIG_MODVERSIONS=y
          CONFIG_MODULE_SRCVERSION_ALL=n
          CONFIG_MODULE_SIG=n
          CONFIG_MODULE_COMPRESS=n
          CONFIG_TRIM_UNUSED_KSYMS=n
          EOF
            echo "Configs appended successfully."
          else
            echo "WARNING: su.config not found!"
          fi

      - name: Step A - Generate Config
        run: |
          export PATH=/usr/lib/llvm-22/bin:$PATH
          cd "${KERNEL_ROOT}"
          make -j$(nproc --all) O="${OUTDIR}" ${DEVICE}_defconfig su.config perf.config custom.config 2>&1 | tee build_generate_config.log

      - name: Step B - Prepare
        run: |
          export PATH=/usr/lib/llvm-22/bin:$PATH
          cd "${KERNEL_ROOT}"
          make -j4 prepare O="${OUTDIR}" 2>&1 | tee -a build_generate_config.log

      - name: Step B - Compile Kernel Image
        run: |
          export PATH=/usr/lib/llvm-22/bin:$PATH
          export LD=ld.lld
          cd "${KERNEL_ROOT}"
          make -j$(nproc --all) O="${OUTDIR}" 2>&1 | tee build.log

      - name: Step C - Install & Strip Modules
        run: |
          export PATH=/usr/lib/llvm-22/bin:$PATH
          export LD=ld.lld
          cd "${KERNEL_ROOT}"
          make -j$(nproc --all) O="${OUTDIR}" INSTALL_MOD_STRIP="--strip-debug --keep-section=.ARM.attributes" INSTALL_MOD_PATH="${MODULES_OUTDIR}" modules_install 2>&1 | tee -a build.log || true

      - name: Module Filtering & Dependency Logic
        run: |
          find "${MODULES_OUTDIR}/lib/modules" -type f -name "modules.builtin" -exec cp {} "${FINAL_STAGING}/lib/modules/0.0/" \; || true
          find "${MODULES_OUTDIR}/lib/modules" -type f -name "modules.order" -exec cp {} "${FINAL_STAGING}/lib/modules/0.0/" \; || true
          if [ -f "${IN_DLKM}/modules.load" ]; then cp "${IN_DLKM}/modules.load" "${FINAL_STAGING}/lib/modules/0.0/modules.load"; fi
          
          missing_modules=""
          while read -r module; do
            [ -z "$module" ] && continue
            [[ "$module" =~ ^#.*$ ]] && continue
            found=$(find "${MODULES_OUTDIR}/lib/modules" -name "$module" -type f | head -n 1 || true)
            if [ -f "$found" ]; then echo "FOUND: $module -> $found"; else missing_modules="${missing_modules} $module"; fi
          done < "${IN_DLKM}/modules.load"
          if [ -n "$missing_modules" ]; then echo "WARNING: Modules not found:$missing_modules" | tee -a build.log; fi

      - name: Finalizing Output & Packaging
        run: |
          mkdir -p "${GITHUB_WORKSPACE}/artifacts"
          if [ -f "${OUTDIR}/arch/arm64/boot/Image" ]; then
            cp "${OUTDIR}/arch/arm64/boot/Image" "${GITHUB_WORKSPACE}/artifacts/Image"
          else
            echo "WARNING: Image not found!"; exit 1
          fi
          if [ -d "${MODULES_OUTDIR}/lib" ]; then tar -C "${MODULES_OUTDIR}" -czf "${GITHUB_WORKSPACE}/artifacts/modules_out.tgz" lib; fi
          if [ -d "${FINAL_STAGING}" ]; then tar -C "${FINAL_STAGING}" -czf "${GITHUB_WORKSPACE}/artifacts/staging.tgz" .; fi
          cp "${KERNEL_ROOT}/build.log" "${GITHUB_WORKSPACE}/artifacts/build.log" || true
          cp "${KERNEL_ROOT}/build_generate_config.log" "${GITHUB_WORKSPACE}/artifacts/build_generate_config.log" || true

      - name: Upload Kernel Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: m14x-kernel-build
          path: ${{ github.workspace }}/artifacts/*
