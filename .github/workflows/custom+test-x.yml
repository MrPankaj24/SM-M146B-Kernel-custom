name: 🏗️ll M14 Kernel Build (SUSFS + ZeroMount + ReSukisu)
on:
  workflow_dispatch:
    inputs:
      KERNEL_SOURCE:
        description: 'Kernel Source URL'
        required: true
        default: 'https://github.com/MrPankaj24/Samsung_Kernels_M14-wksu'
      KERNEL_BRANCH:
        description: 'Kernel Branch'
        required: true
        default: 'all_test'
      CLANG_VERSION:
        description: 'Select Compiler Toolchain'
        type: choice
        options:
          - 'clang-r487747c (AOSP - Android 14)'
          - 'clang-r450784d (AOSP - Android 13)'
          - 'clang-22 (LLVM Official)'
          - 'clang-20 (Neutron)'
        default: 'clang-20 (Neutron)'
      DEVICE:
        description: 'Device Codename'
        required: true
        default: 'm14x'
      ENABLE_SU_CONFIG:
        description: 'Enable su.config (KernelSU + SUSFS + Anti-Root Bypass)?'
        type: boolean
        default: true
      ENABLE_MY_SU_CONFIG:
        description: 'Enable My Custom su.config (Enhanced SUSFS + ZeroMount)?'
        type: boolean
        default: false
      ENABLE_PERF_CONFIG:
        description: 'Enable perf.config?'
        type: boolean
        default: true
      ENABLE_NETHUNTER_CONFIG:
        description: 'Enable nethunter.config?'
        type: boolean
        default: true
      ENABLE_CUSTOM_CONFIG:
        description: 'Enable custom.config?'
        type: boolean
        default: true
      EXTRA_CONFIG_URLS:
        description: 'Extra .config URLs (comma-separated, optional)'
        required: false
        default: ''
jobs:
  build:
    name: 🏗️ Build Kernel (${{ github.event.inputs.DEVICE }})
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    env:
      KERNEL_ROOT: ${{ github.workspace }}/kernel_workspace
      OUTDIR: ${{ github.workspace }}/kernel_workspace/out
      MODULES_OUTDIR: ${{ github.workspace }}/kernel_workspace/modules_out
      TARGET_SOC: s5e8535
      ARCH: arm64
      SUBARCH: arm64
    steps:
      - name: 📦 Install Build Dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y --no-install-recommends \
            build-essential make bc libncurses-dev bison flex \
            python3 python3-setuptools python-is-python3 git ccache rsync \
            libssl-dev libelf-dev dwarves device-tree-compiler \
            file gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu sudo \
            lz4 zstd cpio curl wget zip unzip
      - name: 🧹 Prepare Workspace
        run: |
          set -euo pipefail
          rm -rf "${KERNEL_ROOT}"
          mkdir -p "${KERNEL_ROOT}"
      - name: 📥 Clone Kernel Source
        run: |
          git clone --depth=1 -b ${{ github.event.inputs.KERNEL_BRANCH }} \
            ${{ github.event.inputs.KERNEL_SOURCE }} ${KERNEL_ROOT}
      - name: 🔧 Setup Toolchain (${{ github.event.inputs.CLANG_VERSION }})
        run: |
          set -euo pipefail
          CHOICE="${{ github.event.inputs.CLANG_VERSION }}"
          if [[ "$CHOICE" == *"AOSP"* ]]; then
            CLANG_VER=$(echo "$CHOICE" | awk '{print $1}')
            if [[ "$CLANG_VER" == "clang-r487747c" ]]; then
              DL_URL="https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/tags/android-14.0.0_r1/${CLANG_VER}.tar.gz"
            else
              DL_URL="https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/android13-release/${CLANG_VER}.tar.gz"
            fi
            mkdir -p ${GITHUB_WORKSPACE}/toolchains/${CLANG_VER}
            curl -L "$DL_URL" | tar -xzf - -C ${GITHUB_WORKSPACE}/toolchains/${CLANG_VER}
            echo "COMPILER_PATH=${GITHUB_WORKSPACE}/toolchains/${CLANG_VER}/bin" >> $GITHUB_ENV
            echo "COMPILER_CC=clang" >> $GITHUB_ENV
          elif [[ "$CHOICE" == *"clang-22"* ]]; then
            curl -fsSL https://apt.llvm.org/llvm-snapshot.gpg.key | sudo gpg --dearmor -o /usr/share/keyrings/llvm-archive-keyring.gpg
            echo "deb [signed-by=/usr/share/keyrings/llvm-archive-keyring.gpg] http://apt.llvm.org/noble/ llvm-toolchain-noble-22 main" | sudo tee /etc/apt/sources.list.d/llvm.list
            sudo apt-get update -y
            sudo apt-get install -y clang-22 llvm-22 lld-22
            echo "COMPILER_PATH=/usr/bin" >> $GITHUB_ENV
            echo "COMPILER_CC=clang-22" >> $GITHUB_ENV
          elif [[ "$CHOICE" == *"Neutron"* ]]; then
            mkdir -p ${GITHUB_WORKSPACE}/toolchains/neutron && cd ${GITHUB_WORKSPACE}/toolchains/neutron
            curl -LO "https://raw.githubusercontent.com/Neutron-Toolchains/antman/main/antman"
            chmod +x antman && ./antman -S
            echo "COMPILER_PATH=${GITHUB_WORKSPACE}/toolchains/neutron/bin" >> $GITHUB_ENV
            echo "COMPILER_CC=clang" >> $GITHUB_ENV
          fi
      - name: ⬇️ Download AOSP Build Tools
        run: |
          git clone --depth=1 -b main https://android.googlesource.com/kernel/prebuilts/build-tools ${GITHUB_WORKSPACE}/toolchains/build-tools
          echo "AOSP_TOOLS_PATH=${GITHUB_WORKSPACE}/toolchains/build-tools/linux-x86/bin" >> $GITHUB_ENV
      - name: 📝 Generate Clean su.config
        if: github.event.inputs.ENABLE_SU_CONFIG == 'true' && github.event.inputs.ENABLE_MY_SU_CONFIG != 'true'
        run: |
          cd ${KERNEL_ROOT}
          cat > arch/arm64/configs/su.config << 'EOF'
          CONFIG_KPROBES=y
          CONFIG_KPROBE_EVENTS=y
          CONFIG_HAVE_KPROBES=y
          CONFIG_KSU=y
          CONFIG_KSU_SUSFS=y
          CONFIG_KSU_SUSFS_SUS_PATH=y
          CONFIG_KSU_SUSFS_SUS_MOUNT=y
          CONFIG_KSU_SUSFS_SUS_KSTAT=y
          CONFIG_KSU_SUSFS_SUS_MAP=y
          CONFIG_KSU_SUSFS_SPOOF_UNAME=y
          CONFIG_KSU_SUSFS_ENABLE_LOG=y
          CONFIG_KSU_SUSFS_SPOOF_CMDLINE_OR_BOOTCONFIG=y
          CONFIG_KSU_SUSFS_OPEN_REDIRECT=y
          CONFIG_KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS=y
          CONFIG_UH=n
          CONFIG_RKP=n
          CONFIG_KDP=n
          CONFIG_SECURITY_DEFEX=n
          CONFIG_PROCA=n
          CONFIG_FIVE=n
          CONFIG_MODULES=y
          CONFIG_MODULE_FORCE_LOAD=y
          CONFIG_MODULE_UNLOAD=y
          CONFIG_MODULE_FORCE_UNLOAD=y
          CONFIG_MODVERSIONS=y
          CONFIG_MODULE_SIG=n
          CONFIG_MODULE_COMPRESS=n
          CONFIG_TRIM_UNUSED_KSYMS=n
          CONFIG_IP_NF_TARGET_TTL=y
          CONFIG_IP6_NF_TARGET_HL=y
          CONFIG_IP6_NF_MATCH_HL=y
          CONFIG_TCP_CONG_ADVANCED=y
          CONFIG_TCP_CONG_BBR=y
          CONFIG_NET_SCH_FQ=y
          CONFIG_TCP_CONG_CUBIC=y
          CONFIG_TCP_CONG_BIC=n
          CONFIG_TCP_CONG_WESTWOOD=y
          CONFIG_TCP_CONG_HTCP=y
          CONFIG_IP_SET=y
          CONFIG_IP_SET_MAX=65534
          CONFIG_IP_SET_BITMAP_IP=y
          CONFIG_IP_SET_BITMAP_IPMAC=y
          CONFIG_IP_SET_BITMAP_PORT=y
          CONFIG_IP_SET_HASH_IP=y
          CONFIG_IP_SET_HASH_IPMARK=y
          CONFIG_IP_SET_HASH_IPPORT=y
          CONFIG_IP_SET_HASH_IPPORTIP=y
          CONFIG_IP_SET_HASH_IPPORTNET=y
          CONFIG_IP_SET_HASH_IPMAC=y
          CONFIG_IP_SET_HASH_MAC=y
          CONFIG_IP_SET_HASH_NETPORTNET=y
          CONFIG_IP_SET_HASH_NET=y
          CONFIG_IP_SET_HASH_NETNET=y
          CONFIG_IP_SET_HASH_NETPORT=y
          CONFIG_IP_SET_HASH_NETIFACE=y
          CONFIG_IP_SET_LIST_SET=y
          CONFIG_KALLSYMS=y
          CONFIG_KALLSYMS_ALL=y
          EOF
      - name: 📝 Generate My Custom su.config (Enhanced SUSFS + ZeroMount)
        if: github.event.inputs.ENABLE_MY_SU_CONFIG == 'true'
        run: |
          cd ${KERNEL_ROOT}
          cat > arch/arm64/configs/su.config << 'EOF'
          CONFIG_KSU=y
          CONFIG_KSU_SUSFS=y
          CONFIG_KSU_SUSFS_SUS_PATH=y
          CONFIG_KSU_SUSFS_SUS_MOUNT=y
          CONFIG_KSU_SUSFS_SUS_KSTAT=y
          CONFIG_KSU_SUSFS_SUS_KSTAT_REDIRECT=y
          CONFIG_KSU_SUSFS_SUS_MAP=y
          CONFIG_KSU_SUSFS_SPOOF_UNAME=y
          CONFIG_KSU_SUSFS_ENABLE_LOG=y
          CONFIG_KSU_SUSFS_SPOOF_CMDLINE_OR_BOOTCONFIG=y
          CONFIG_KSU_SUSFS_OPEN_REDIRECT=y
          CONFIG_KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS=y
          CONFIG_KSU_SUSFS_UNICODE_FILTER=y
          CONFIG_KSU_SUSFS_HIDDEN_NAME=y
          CONFIG_KSU_SUSFS_HARDENED=y
          CONFIG_ZEROMOUNT=y
          CONFIG_UH=n
          CONFIG_RKP=n
          CONFIG_KDP=n
          CONFIG_SECURITY_DEFEX=n
          CONFIG_PROCA=n
          CONFIG_FIVE=n
          CONFIG_MODULES=y
          CONFIG_MODULE_FORCE_LOAD=y
          CONFIG_MODULE_UNLOAD=y
          CONFIG_MODULE_FORCE_UNLOAD=y
          CONFIG_MODVERSIONS=y
          CONFIG_MODULE_SIG=n
          CONFIG_MODULE_COMPRESS=n
          CONFIG_TRIM_UNUSED_KSYMS=n
          CONFIG_IP_NF_TARGET_TTL=y
          CONFIG_IP6_NF_TARGET_HL=y
          CONFIG_IP6_NF_MATCH_HL=y
          CONFIG_TCP_CONG_ADVANCED=y
          CONFIG_TCP_CONG_BBR=y
          CONFIG_NET_SCH_FQ=y
          CONFIG_TCP_CONG_CUBIC=y
          CONFIG_TCP_CONG_BIC=n
          CONFIG_TCP_CONG_WESTWOOD=y
          CONFIG_TCP_CONG_HTCP=y
          CONFIG_IP_SET=y
          CONFIG_IP_SET_MAX=65534
          CONFIG_IP_SET_BITMAP_IP=y
          CONFIG_IP_SET_BITMAP_IPMAC=y
          CONFIG_IP_SET_BITMAP_PORT=y
          CONFIG_IP_SET_HASH_IP=y
          CONFIG_IP_SET_HASH_IPMARK=y
          CONFIG_IP_SET_HASH_IPPORT=y
          CONFIG_IP_SET_HASH_IPPORTIP=y
          CONFIG_IP_SET_HASH_IPPORTNET=y
          CONFIG_IP_SET_HASH_IPMAC=y
          CONFIG_IP_SET_HASH_MAC=y
          CONFIG_IP_SET_HASH_NETPORTNET=y
          CONFIG_IP_SET_HASH_NET=y
          CONFIG_IP_SET_HASH_NETNET=y
          CONFIG_IP_SET_HASH_NETPORT=y
          CONFIG_IP_SET_HASH_NETIFACE=y
          CONFIG_IP_SET_LIST_SET=y
          CONFIG_KALLSYMS=y
          CONFIG_KALLSYMS_ALL=y
          CONFIG_ZSMALLOC=y
          CONFIG_ZRAM=y
          CONFIG_ZRAM_WRITEBACK=y
          CONFIG_CRYPTO_LZO=y
          CONFIG_CRYPTO_LZ4=y
          CONFIG_CRYPTO_LZ4HC=y
          CONFIG_CRYPTO_LZ4KD=y
          CONFIG_CRYPTO_842=y
          CONFIG_ZRAM_DEF_COMP_LZ4KD=y
          CONFIG_TMPFS_XATTR=y
          CONFIG_TMPFS_POSIX_ACL=y
          EOF
      - name: 📥 Fetch Extra Configs
        run: |
          cd ${KERNEL_ROOT}/arch/arm64/configs/
          fetch_config() {
            local url="$1" filename="$2"
            if [ -n "$url" ]; then
              raw_url=$(echo "$url" | sed 's/github.com/raw.githubusercontent.com/' | sed 's/\/blob\//\//')
              curl -LSs "$raw_url" -o "$filename" && echo "✅ $filename downloaded"
            fi
          }
          [ "${{ github.event.inputs.ENABLE_PERF_CONFIG }}" == "true" ] && fetch_config "https://github.com/MrPankaj24/kernel_common_modifications/raw/basic/arch/arm64/configs/perf.config" "perf.config"
          [ "${{ github.event.inputs.ENABLE_NETHUNTER_CONFIG }}" == "true" ] && fetch_config "https://github.com/MrPankaj24/kernel_common_modifications/raw/basic/arch/arm64/configs/nethunter.config" "nethunter.config"
          [ "${{ github.event.inputs.ENABLE_CUSTOM_CONFIG }}" == "true" ] && fetch_config "https://github.com/MrPankaj24/kernel_common_modifications/raw/basic/arch/arm64/configs/custom.config" "custom.config"
          IFS=',' read -ra EXTRA_URLS <<< "${{ github.event.inputs.EXTRA_CONFIG_URLS }}"
          for url in "${EXTRA_URLS[@]}"; do
            url=$(echo "$url" | xargs)
            [ -n "$url" ] && fetch_config "$url" "$(basename "$url" | sed 's/\/blob\//\//')"
          done
      - name: 🔨 Compile Kernel
        run: |
          set -euo pipefail
          cd ${KERNEL_ROOT}
          mkdir -p ${OUTDIR}
          export PATH="${COMPILER_PATH}:${AOSP_TOOLS_PATH}:$PATH"
          export CC="${COMPILER_CC}"
          export LD=ld.lld
          export CROSS_COMPILE=aarch64-linux-gnu-
          export CROSS_COMPILE_COMPAT=arm-linux-gnueabi-
          export LLVM=1
          export LLVM_IAS=1
          export DTC_FLAGS="-@"
          CONFIG_ARGS="${{ github.event.inputs.DEVICE }}_defconfig"
          [ "${{ github.event.inputs.ENABLE_SU_CONFIG }}" == "true" ] || [ "${{ github.event.inputs.ENABLE_MY_SU_CONFIG }}" == "true" ] && [ -f "arch/arm64/configs/su.config" ] && CONFIG_ARGS="$CONFIG_ARGS su.config"
          [ "${{ github.event.inputs.ENABLE_PERF_CONFIG }}" == "true" ] && [ -f "arch/arm64/configs/perf.config" ] && CONFIG_ARGS="$CONFIG_ARGS perf.config"
          [ "${{ github.event.inputs.ENABLE_NETHUNTER_CONFIG }}" == "true" ] && [ -f "arch/arm64/configs/nethunter.config" ] && CONFIG_ARGS="$CONFIG_ARGS nethunter.config"
          [ "${{ github.event.inputs.ENABLE_CUSTOM_CONFIG }}" == "true" ] && [ -f "arch/arm64/configs/custom.config" ] && CONFIG_ARGS="$CONFIG_ARGS custom.config"
          echo ">>> Config: make $CONFIG_ARGS"
          make O="${OUTDIR}" CC="${CC}" $CONFIG_ARGS
          echo ">>> Building with $(nproc --all) threads..."
          make -j$(nproc --all) O="${OUTDIR}" CC="${CC}" 2>&1 | tee build.log
      - name: 🧩 Install & Strip Modules
        run: |
          set -euo pipefail
          cd ${KERNEL_ROOT}
          mkdir -p ${MODULES_OUTDIR}
          export PATH="${COMPILER_PATH}:${AOSP_TOOLS_PATH}:$PATH"
          export CC="${COMPILER_CC}"
          export LD=ld.lld
          export CROSS_COMPILE=aarch64-linux-gnu-
          make -j$(nproc --all) O="${OUTDIR}" CC="${CC}" \
            INSTALL_MOD_STRIP="--strip-debug --keep-section=.ARM.attributes" \
            INSTALL_MOD_PATH="${MODULES_OUTDIR}" modules_install 2>&1 | tee -a build.log || true
      - name: 📦 Package Artifacts
        run: |
          mkdir -p ${GITHUB_WORKSPACE}/artifacts/kernel
          [ -f ${OUTDIR}/arch/arm64/boot/Image ] && cp ${OUTDIR}/arch/arm64/boot/Image ${GITHUB_WORKSPACE}/artifacts/kernel/
          [ -d "${MODULES_OUTDIR}/lib" ] && tar -C "${MODULES_OUTDIR}" -czf "${GITHUB_WORKSPACE}/artifacts/modules_out.tgz" lib
      - name: ⬆️ Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: m14-kernel-${{ github.event.inputs.CLANG_VERSION }}-build
          path: ${{ github.workspace }}/artifacts/
          retention-days: 7
