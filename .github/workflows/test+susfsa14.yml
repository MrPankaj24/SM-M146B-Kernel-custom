name: 🧪 SUSFS Patch Tester & Reject Collector

on:
  workflow_dispatch:
    inputs:
      KERNEL_BRANCH:
        description: 'Kernel Source Branch to Test Against'
        required: true
        default: 'master'
      SUSFS_VERSION:
        description: 'Select SUSFS Patch Version to Test'
        type: choice
        options:
          - '6.6 (Android 15 / One UI 7)'
          - '5.15 (Android 13-14 / One UI 6)'
        default: '6.6 (Android 15 / One UI 7)'
      STRIP_LEVEL:
        description: 'Patch Strip Level (-p1, -p0, etc.)'
        type: choice
        options:
          - '-p1'
          - '-p0'
        default: '-p1'

env:
  KERNEL_SOURCE: 'https://github.com/devhunter1/android_kernel_samsung_s5e8535.git'
  KERNEL_ROOT: ${{ github.workspace }}/kernel_workspace
  REJECT_DIR: ${{ github.workspace }}/patch_rejects

jobs:
  test_patch:
    name: 🔍 Test Patch Application
    runs-on: ubuntu-24.04
    
    steps:
      - name: 🧹 Prepare Directories
        run: |
          rm -rf "${KERNEL_ROOT}" "${REJECT_DIR}" "${GITHUB_WORKSPACE}/susfs4ksu"
          mkdir -p "${KERNEL_ROOT}"
          mkdir -p "${REJECT_DIR}"

      - name: 📥 Clone Target Kernel Source
        run: |
          echo ">>> Cloning Kernel Source: ${{ github.event.inputs.KERNEL_BRANCH }}"
          git clone --depth=1 -b ${{ github.event.inputs.KERNEL_BRANCH }} ${{ env.KERNEL_SOURCE }} ${KERNEL_ROOT}

      - name: 📥 Clone Official SUSFS Repository
        run: |
          cd ${GITHUB_WORKSPACE}
          CHOICE="${{ github.event.inputs.SUSFS_VERSION }}"
          
          if [[ "$CHOICE" == *"6.6"* ]]; then
            echo ">>> Cloning official SUSFS 6.6 branch..."
            git clone --depth=1 -b gki-android15-6.6 https://gitlab.com/simonpunk/susfs4ksu.git susfs4ksu
            echo "PATCH_PATH=susfs4ksu/kernel_patches/50_add_susfs_in_gki-android15-6.6.patch" >> $GITHUB_ENV
          else
            echo ">>> Cloning official SUSFS 5.15 branch..."
            git clone --depth=1 -b gki-android13-5.15 https://gitlab.com/simonpunk/susfs4ksu.git susfs4ksu
            echo "PATCH_PATH=susfs4ksu/kernel_patches/50_add_susfs_in_gki-android13-5.15.patch" >> $GITHUB_ENV
          fi

      - name: 🛠️ Apply Official Patch & Monitor Rejects
        run: |
          cd ${KERNEL_ROOT}
          FULL_PATCH_PATH="${GITHUB_WORKSPACE}/${{ env.PATCH_PATH }}"
          
          if [ -f "$FULL_PATCH_PATH" ]; then
            echo ">>> Attempting to apply official patch: ${{ env.PATCH_PATH }}"
            patch ${{ github.event.inputs.STRIP_LEVEL }} --forward < "$FULL_PATCH_PATH" || true
          else
            echo "❌ ERROR: Target patch file not found at $FULL_PATCH_PATH!"
            exit 1
          fi

      - name: 📁 Collect and Structure Reject (.rej) Files
        run: |
          cd ${KERNEL_ROOT}
          echo ">>> Scanning repository for patch reject (.rej) files..."
          
          # Find all .rej files and map out how many failed
          REJ_COUNT=$(find . -name "*.rej" | wc -l)
          echo "TOTAL_REJECTS=$REJ_COUNT" >> $GITHUB_ENV
          
          if [ "$REJ_COUNT" -gt 0 ]; then
            echo "⚠️ Found $REJ_COUNT rejected hunks! Preserving original directory structure..."
            
            # Using rsync to copy files over while keeping their paths intact
            find . -name "*.rej" -print0 | rsync -0av --files-from=- ./ "${REJECT_DIR}/"
            
            echo "✅ All reject files mapped successfully into staging directory."
          else
            echo "🎉 Perfect! Official SUSFS patch applies completely clean with 0 rejects."
            echo "No files to collect."
          fi

      - name: ⬆️ Upload Patch Rejects Bundle
        if: env.TOTAL_REJECTS > 0
        uses: actions/upload-artifact@v4
        with:
          name: susfs-rejects-${{ github.event.inputs.KERNEL_BRANCH }}
          path: ${{ env.REJECT_DIR }}/
          retention-days: 5

      - name: 📊 Status Verdict
        run: |
          if [ "${{ env.TOTAL_REJECTS }}" -gt 0 ]; then
            echo "❌ TEST FAILED: ${{ env.TOTAL_REJECTS }} hunk conflicts detected."
            echo "Check your workflow run artifacts to view the exact structural code rejects."
            exit 1
          else
            echo "🚀 TEST PASSED: Source tree is 100% compatible with this official SUSFS layout!"
          fi
