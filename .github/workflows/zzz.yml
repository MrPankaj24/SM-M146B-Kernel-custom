name: 🏗️ Zero M14 ReSukiSU Kernel Build

permissions:
  contents: write
  actions: write 

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: "Choose Release Type"
        required: true
        type: choice
        options:
          - Actions (No Release)
          - Release
        default: Actions (No Release)

env:
  BRANCH: "SM-M146B-Oneui7-ADYJ2"
  ANDROID_VERSION: "android13"
  KERNEL_VERSION: "5.15"
  CONFIG_DIR: "SM-M146B-Oneui7-ADYJ2-android13-5.15"
  DEFCONFIG: "SM-M146B-Oneui7-ADYJ2-android13-5.15/arch/arm64/configs/s5e8535-m14xnsxx_defconfig"
  RELEASE_NAME: "M14 Custom Kernel (ReSukiSU + SUSFS Latest)"

jobs:
  build-m14:
    name: "Build SM-M146B"
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: 🧹 Free Disk Space
        uses: endersonmenezes/free-disk-space@v3
        with:
          remove_android: true
          remove_dotnet: true
          remove_haskell: true
          remove_tool_cache: true
          remove_swap: true
          remove_packages: "azure-cli google-cloud-cli microsoft-edge-stable google-chrome-stable firefox postgresql* temurin-* *llvm* mysql* dotnet-sdk-*"
          remove_packages_one_command: true
          remove_folders: "/usr/share/swift /usr/share/miniconda /usr/share/az* /usr/local/lib/node_modules /usr/local/share/chromium /usr/local/share/powershell /usr/local/julia /usr/local/aws-cli /usr/local/aws-sam-cli /usr/share/gradle"
          rm_cmd: "rmz"
          rmz_version: "3.1.1"
          testing: false

      - name: 📥 Clone Dependencies
        run: |
          git clone https://github.com/WildKernels/AnyKernel3.git -b "gki-2.0" AnyKernel3
          git clone https://github.com/WildKernels/kernel_patches.git custom_patches

      - name: 📥 Clone Kernel Source
        run: |
          echo ">>> Cloning Kernel Source..."
          git clone --depth 1 -b $BRANCH --single-branch https://github.com/WildKernels/Samsung_Kernels.git $CONFIG_DIR

      - name: 📦 Extract tar.xz Archives
        run: |
          cd $CONFIG_DIR
          find . -type f -name '*.tar.xz' -print0 | while IFS= read -r -d '' file; do
            echo "Extracting $file"
            tar -xf "$file"
            rm "$file"
          done

      # ==========================================
      # 1. RESUKISU SETUP & SAFETY PATCH
      # ==========================================
      - name: 🛡️ Setup ReSukiSU
        run: |
          cd $CONFIG_DIR
          echo ">>> Cloning ReSukiSU..."
          git clone https://github.com/ReSukiSU/ReSukiSU.git KernelSU
          
          echo ">>> Running ReSukiSU setup.sh..."
          curl -LSs "https://raw.githubusercontent.com/ReSukiSU/ReSukiSU/main/kernel/setup.sh" | bash

          echo ">>> Fetching and applying 70_ksu_safety patch..."
          curl -LSs "https://raw.githubusercontent.com/Enginex0/Super-Builders/main/android13-5.15/ReSukiSU/patches/70_ksu_safety-resukisu-5.15.patch" -o 70_ksu_safety.patch
          cd KernelSU
          patch -p1 --forward < ../70_ksu_safety.patch || echo "⚠️ 70_ksu_safety.patch had issues."
          cd ..

      # ==========================================
      # 2. SUSFS PATCH SEQUENCE
      # ==========================================
      - name: 🧩 Clone SUSFS & Execute Patch Sequence
        run: |
          cd $CONFIG_DIR
          
          echo ">>> Cloning Official SUSFS from GitLab..."
          git clone https://gitlab.com/simonpunk/susfs4ksu.git -b gki-android13-5.15 susfs4ksu
          
          echo ">>> Copying SUSFS files to Kernel Tree..."
          cp -r susfs4ksu/kernel_patches/fs/* fs/
          cp -r susfs4ksu/kernel_patches/include/linux/* include/linux/
          
          echo ">>> Extracting 50_add_susfs_in_gki patch..."
          cp susfs4ksu/kernel_patches/50_add_susfs_in_gki-android13-5.15.patch ./50_custom.patch
          
          echo ">>> Downloading your extracted kstat_redirect patch..."
          curl -LSs "https://raw.githubusercontent.com/MrPankaj24/SM-M146B-Kernel-custom/main/temp/53_add_kstat_redirect-android13-5.15.patch" -o 53_add_kstat_redirect.patch

          echo ">>> Staging Device Fixes..."
          cp ../custom_patches/samsung/$BRANCH/*.patch ./ 2>/dev/null || true

          echo -e "\n---> 1. Applying 50_custom.patch (Official)"
          patch -p1 --forward < 50_custom.patch || echo "⚠️ 50_custom.patch generated rejects. Proceeding to fixes..."

          echo -e "\n---> 2. Applying device-specific fixes..."
          for p in *.patch; do
            if [[ "$p" != "50_custom.patch" ]] && [[ "$p" != "53_add_kstat_redirect.patch" ]] && [[ "$p" != "70_ksu_safety.patch" ]]; then
              echo "  Applying: $p"
              patch -p1 --forward < "$p" || echo "  ⚠️ $p had issues."
            fi
          done

          echo -e "\n---> 3. Applying 53_add_kstat_redirect.patch"
          patch -p1 --forward < 53_add_kstat_redirect.patch || echo "⚠️ 53_add_kstat_redirect.patch had issues."

      # ==========================================
      # 3. BBG SETUP
      # ==========================================
      - name: 🔒 Add Baseband Guard (BBG)
        run: |          
          cd $CONFIG_DIR
          echo ">>> Adding BBG..."
          curl -LSs https://github.com/vc-teahouse/Baseband-guard/raw/main/setup.sh | bash
          echo "CONFIG_BBG=y" >> arch/arm64/configs/s5e8535-m14xnsxx_defconfig
          sed -i '/^config LSM$/,/^help$/{ /^[[:space:]]*default/ { /baseband_guard/! s/selinux/selinux,baseband_guard/ } }' security/Kconfig

          if grep -qxF $'\t\tconst char* symlink_target_link = inode->i_op->get_link(dentry, inode, NULL);' ./Baseband-guard/baseband_guard.c; then
            echo "Applying BBG get_link fix"
            patch -p1 --forward < "../custom_patches/experimental/bbg/bbg_fix_get_link.patch"
          fi

      # ==========================================
      # 4. CONFIGURATION INJECTION
      # ==========================================
      - name: ⚙️ Set Kernel Configuration Variables
        run: |
          echo ">>> Injecting Custom Configs into Defconfig..."
          cat >> "$DEFCONFIG" << 'EOF'
          
          # === CORE ROOT/SUSFS ===
          CONFIG_KSU_SUSFS=y
          CONFIG_KPROBES=y
          CONFIG_KPROBE_EVENTS=y
          CONFIG_HAVE_KPROBES=y
          CONFIG_TMPFS_XATTR=y
          CONFIG_TMPFS_POSIX_ACL=y
          CONFIG_LOG_BUF_SHIFT=20
          
          # === SUSFS KSTAT EXTENSIONS ===
          CONFIG_KSU_SUSFS_SUS_KSTAT=y
          CONFIG_KSU_SUSFS_SUS_KSTAT_REDIRECT=y
          
          # === ROOT PROTECTION REMOVAL ===
          CONFIG_UH=n
          CONFIG_UH_RKP=n
          CONFIG_UH_LKMAUTH=n
          CONFIG_UH_LKM_BLOCK=n
          CONFIG_RKP_CFP_JOPP=n
          CONFIG_RKP_CFP=n
          CONFIG_SECURITY_DEFEX=n
          CONFIG_PROCA=n
          CONFIG_FIVE=n
          CONFIG_RKP=n
          CONFIG_KDP_NS=n
          CONFIG_KDP=n
          
          # === FORCE LOAD MODULES ===
          CONFIG_MODULES=y
          CONFIG_MODULE_FORCE_LOAD=y
          CONFIG_MODULE_UNLOAD=y
          CONFIG_MODULE_FORCE_UNLOAD=y
          CONFIG_MODVERSIONS=y
          CONFIG_MODULE_SRCVERSION_ALL=n
          CONFIG_MODULE_SIG=n
          CONFIG_MODULE_COMPRESS=n
          CONFIG_TRIM_UNUSED_KSYMS=n

          # === USER CUSTOM BASE CONFIGS ===
          CONFIG_KSU=y
          CONFIG_IP_NF_TARGET_TTL=y
          CONFIG_IP6_NF_TARGET_HL=y
          CONFIG_IP6_NF_MATCH_HL=y
          CONFIG_TCP_CONG_ADVANCED=y
          CONFIG_TCP_CONG_BBR=y
          CONFIG_NET_SCH_FQ=y
          CONFIG_TCP_CONG_CUBIC=y
          CONFIG_TCP_CONG_BIC=n
          CONFIG_TCP_CONG_WESTWOOD=y
          CONFIG_TCP_CONG_HTCP=y
          CONFIG_IP_SET=y
          CONFIG_IP_SET_MAX=65534
          CONFIG_IP_SET_BITMAP_IP=y
          CONFIG_IP_SET_BITMAP_IPMAC=y
          CONFIG_IP_SET_BITMAP_PORT=y
          CONFIG_IP_SET_HASH_IP=y
          CONFIG_IP_SET_HASH_IPMARK=y
          CONFIG_IP_SET_HASH_IPPORT=y
          CONFIG_IP_SET_HASH_IPPORTIP=y
          CONFIG_IP_SET_HASH_IPPORTNET=y
          CONFIG_IP_SET_HASH_IPMAC=y
          CONFIG_IP_SET_HASH_MAC=y
          CONFIG_IP_SET_HASH_NETPORTNET=y
          CONFIG_IP_SET_HASH_NET=y
          CONFIG_IP_SET_HASH_NETNET=y
          CONFIG_IP_SET_HASH_NETPORT=y
          CONFIG_IP_SET_HASH_NETIFACE=y
          CONFIG_IP_SET_LIST_SET=y
          CONFIG_KALLSYMS=y
          CONFIG_KALLSYMS_ALL=y
          EOF

          cd $CONFIG_DIR
          sed -i 's/check_defconfig//' ./build.config.gki

      - name: ✏️ Change Kernel Name & Clean
        run: |
          cd $CONFIG_DIR
          sed -i '$s|echo "\$res"|echo "\$res-ReSukiSU"|' ./scripts/setlocalversion
          sed -i 's/-dirty//' ./scripts/setlocalversion
          perl -pi -e 's{UTS_VERSION="\$\(echo \$UTS_VERSION \$CONFIG_FLAGS \$TIMESTAMP \| cut -b -\$UTS_LEN\)"}{UTS_VERSION="#1 SMP PREEMPT Sun Apr 20 04:20:00 UTC 2025"}' ./scripts/mkcompile_h
          rm -rf ./android/abi_gki_protected_exports_*
          perl -pi -e 's/^\s*"protected_exports_list"\s*:\s*"android\/abi_gki_protected_exports_aarch64",\s*$//;' ./BUILD.bazel

      # ==========================================
      # 5. BUILD
      # ==========================================
      - name: 🔨 Build Kernel (M14)
        run : |
          cd $CONFIG_DIR
          echo ">>> Installing dependencies and building..."
          sudo apt update
          sudo apt-get install -y libyaml-dev
          chmod +x build_kernel.sh
          LTO=thin ./build_kernel.sh || true

      # ==========================================
      # 6. PACKAGING & ARTIFACTS
      # ==========================================
      - name: 📦 Prepare AnyKernel3 (Create Flashable ZIP)
        run: |
          IMAGE_PATH="./$CONFIG_DIR/arch/arm64/boot/Image"
          if [ -f "$IMAGE_PATH" ]; then
            cp "$IMAGE_PATH" ./AnyKernel3/Image
            echo "✅ Image successfully copied to AnyKernel3"
            
            cd AnyKernel3
            zip -r9 "../M14-ReSukiSU-Kernel.zip" *
            cd ..
          else
            echo "🚨 Error: Kernel Image not found at $IMAGE_PATH"
            exit 1
          fi

      - name: ⬆️ Upload Kernel ZIP Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BRANCH }}-Kernel-ZIP
          path: ./M14-ReSukiSU-Kernel.zip
          compression-level: 0

      - name: 🔍 Scan & Collect Patch Rejects
        if: always()
        run: |
          RDIR="${GITHUB_WORKSPACE}/patch-rejects"
          mkdir -p "$RDIR"
          cd $CONFIG_DIR
          mapfile -t REJS < <(find . -type f -name '*.rej' 2>/dev/null)
          echo "REJ_COUNT=${#REJS[@]}" >> $GITHUB_ENV
          if [ ${#REJS[@]} -gt 0 ]; then
            for R in "${REJS[@]}"; do
              mkdir -p "$RDIR/$(dirname "$R")"
              cp "$R" "$RDIR/$R"
              ORIG="${R%.rej}"
              [ -f "$ORIG" ] && cp "$ORIG" "$RDIR/${ORIG}" || true
            done
          fi

      - name: ⬆️ Upload Patch Rejects
        if: always() && env.REJ_COUNT != '0'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BRANCH }}-Leftover-Rejects
          path: ${{ github.workspace }}/patch-rejects/
          retention-days: 5

      # ==========================================
      # 7. GITHUB RELEASE
      # ==========================================
      - name: 🚀 Create GitHub Release
        if: inputs.release_type == 'Release'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: M14-ReSukiSU-${{ github.run_number }}
          name: ${{ env.RELEASE_NAME }}
          files: ./M14-ReSukiSU-Kernel.zip
          body: |
            **IMPORTANT DISCLAIMER**
            This software is provided for testing and educational purposes only. Use at your own risk.
            
            **Build Info:**
            - **Device:** SM-M146B (M14)
            - **Kernel:** 5.15
            - **Manager:** ReSukiSU (with Safety Patch)
            - **SUSFS:** Official Latest + kstat_redirect
            - **BBG:** Enabled
            - **Network/TCP:** BBR, Westwood, FQ enabled
