name: 🏗️ BBG SUSFS ROOT (s5e8535 / M14 - Universal)

on:
  workflow_dispatch:
    inputs:
      KERNEL_SOURCE:
        description: 'Kernel Source URL'
        required: true
        default: 'https://github.com/WildKernels/Samsung_Kernels'
      KERNEL_BRANCH:
        description: 'Kernel Branch'
        required: true
        default: 'SM-M146B-Oneui7-ADYJ2'
      BUILD_METHOD:
        description: 'Build Method'
        type: choice
        options:
          - 'build_kernel.sh (LTO=thin)'
          - 'build_kernel.sh (LTO=full)'
          - 'build_kernel.sh (LTO=none)'
          - 'Manual make - clang-r487747c (AOSP 14)'
          - 'Manual make - clang-r450784d (AOSP 13)'
          - 'Manual make - WildKernels Toolchain'
          - 'Manual make - clang-22 (LLVM APT)'
          - 'Manual make - clang-20 (Neutron)'
        default: 'build_kernel.sh (LTO=thin)'
      DEVICE:
        description: 'Device Codename'
        required: true
        default: 'm14x'

      # --- ROOT ---
      ROOT_MANAGER:
        description: 'Select Root Manager'
        type: choice
        options:
          - 'Wild_KSU'
          - 'ReSukiSU'
          - 'KernelSU-Next'
          - 'KernelSU (Official)'
          - 'None / Skip'
        default: 'Wild_KSU'
      PATCH_ROOT_MANAGER:
        description: 'Run setup.sh? (CHECK for clean sources)'
        type: boolean
        default: true

      # --- SUSFS ---
      ENABLE_SUSFS:
        description: 'Apply SUSFS Patches?'
        type: boolean
        default: true
      SUSFS_BRANCH:
        description: 'SUSFS Branch'
        required: false
        default: 'gki-android13-5.15'
      ENABLE_SUSFS_DEVICE_FIXES:
        description: 'Apply Device-Specific SUSFS Fixes?'
        type: boolean
        default: true
      SUSFS_DEVICE_FIXES_PATH:
        description: 'Path to device fix patches'
        required: false
        default: 'samsung/SM-M146B-Oneui7-ADYJ2'

      # --- BBG ---
      ENABLE_BBG:
        description: 'Enable Baseband Guard (BBG)?'
        type: boolean
        default: true

      # --- CONFIGS ---
      CUSTOM_DEFCONFIG_URL:
        description: 'URL for Custom Defconfig (leave empty to use default)'
        required: false
        default: ''
      ENABLE_SU_CONFIG:
        description: 'Enable su.config (SUSFS + Anti-Root Bypass)?'
        type: boolean
        default: true
      ENABLE_PERF_CONFIG:
        description: 'Enable perf.config (if exists in source)?'
        type: boolean
        default: false
      ENABLE_NETHUNTER_CONFIG:
        description: 'Enable nethunter.config (if exists in source)?'
        type: boolean
        default: false
      ENABLE_CUSTOM_CONFIG:
        description: 'Enable custom.config (if exists in source)?'
        type: boolean
        default: false

      # --- KERNEL NAME ---
      KERNEL_SUFFIX:
        description: 'Custom kernel version suffix'
        required: false
        default: '-Wild-BBG'

jobs:
  build:
    name: 🏗️ Build Kernel (${{ github.event.inputs.DEVICE }})
    runs-on: ubuntu-24.04
    timeout-minutes: 120

    env:
      KERNEL_ROOT: ${{ github.workspace }}/kernel_workspace
      OUTDIR: ${{ github.workspace }}/kernel_workspace/out
      MODULES_OUTDIR: ${{ github.workspace }}/kernel_workspace/modules_out
      TARGET_SOC: s5e8535
      PLATFORM_VERSION: 15
      ANDROID_MAJOR_VERSION: v
      ARCH: arm64
      SUBARCH: arm64
      # Derived defconfig name — change mapping here if needed
      DEFCONFIG_NAME: s5e8535-m14xnsxx

    steps:

      - name: 📥 Checkout Workflow Repository
        uses: actions/checkout@v4

      - name: 🧹 Free Disk Space
        uses: endersonmenezes/free-disk-space@v3
        with:
          remove_android: true
          remove_dotnet: true
          remove_haskell: true
          remove_tool_cache: true
          remove_swap: true
          remove_packages: "azure-cli google-cloud-cli microsoft-edge-stable google-chrome-stable firefox postgresql* temurin-* *llvm* mysql* dotnet-sdk-*"
          remove_packages_one_command: true
          remove_folders: "/usr/share/swift /usr/share/miniconda /usr/share/az* /usr/local/lib/node_modules /usr/local/share/chromium /usr/local/share/powershell /usr/local/julia /usr/local/aws-cli /usr/local/aws-sam-cli /usr/share/gradle"
          rm_cmd: "rmz"
          rmz_version: "3.1.1"
          testing: false

      - name: 📦 Install Build Dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y --no-install-recommends \
            build-essential make bc libncurses-dev bison flex \
            python3 python3-setuptools python-is-python3 git ccache rsync \
            libssl-dev libelf-dev dwarves device-tree-compiler libyaml-dev \
            file gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu sudo \
            lz4 zstd cpio curl wget zip unzip

      - name: 🧹 Prepare Workspace
        run: |
          set -euo pipefail
          rm -rf "${KERNEL_ROOT}"
          mkdir -p "${KERNEL_ROOT}"

      - name: 📥 Clone Kernel Source
        run: |
          git clone --depth=1 -b ${{ github.event.inputs.KERNEL_BRANCH }} \
            ${{ github.event.inputs.KERNEL_SOURCE }} ${KERNEL_ROOT}

      - name: 📦 Extract tar.xz Archives
        run: |
          cd ${KERNEL_ROOT}
          find . -type f -name '*.tar.xz' -print0 | while IFS= read -r -d '' file; do
            echo ">>> Extracting: $file"
            tar -xf "$file"
            rm "$file"
          done

      - name: 📥 Clone AnyKernel3
        run: |
          git clone --depth=1 -b gki-2.0 \
            https://github.com/WildKernels/AnyKernel3.git ${GITHUB_WORKSPACE}/AnyKernel3

      # ==========================================
      # TOOLCHAIN (only for Manual make)
      # ==========================================

      - name: 🔧 Parse Build Method
        run: |
          METHOD="${{ github.event.inputs.BUILD_METHOD }}"

          if [[ "$METHOD" == *"build_kernel.sh"* ]]; then
            echo "USE_BUILD_SCRIPT=true" >> $GITHUB_ENV
            # Extract LTO type from choice string
            LTO=$(echo "$METHOD" | grep -oP 'LTO=\K[a-z]+')
            echo "LTO_TYPE=${LTO:-thin}" >> $GITHUB_ENV
          else
            echo "USE_BUILD_SCRIPT=false" >> $GITHUB_ENV
            # Extract compiler from choice string
            echo "MANUAL_COMPILER=$METHOD" >> $GITHUB_ENV
          fi

      - name: 🔧 Setup Toolchain
        if: env.USE_BUILD_SCRIPT == 'false'
        run: |
          set -euo pipefail
          mkdir -p ${GITHUB_WORKSPACE}/toolchains
          cd ${GITHUB_WORKSPACE}/toolchains

          CHOICE="${MANUAL_COMPILER}"

          if [[ "$CHOICE" == *"WildKernels"* ]]; then
            git clone --depth=1 -b SM-M146B-Oneui7-ADYJ2 \
              https://github.com/WildKernels/Samsung_Kernels.git wild_repo
            CLANG_BIN=$(find wild_repo -type f -name "clang" -executable | head -n 1)
            if [ -n "$CLANG_BIN" ]; then
              echo "COMPILER_PATH=$(realpath "$(dirname "$CLANG_BIN")")" >> $GITHUB_ENV
              echo "COMPILER_CC=clang" >> $GITHUB_ENV
            else
              echo "🚨 ERROR: clang not found in WildKernels repo!" && exit 1
            fi

          elif [[ "$CHOICE" == *"r487747c"* ]]; then
            mkdir -p clang-r487747c
            curl -L "https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/tags/android-14.0.0_r1/clang-r487747c.tar.gz" -o c.tar.gz
            tar -xzf c.tar.gz -C clang-r487747c
            echo "COMPILER_PATH=${GITHUB_WORKSPACE}/toolchains/clang-r487747c/bin" >> $GITHUB_ENV
            echo "COMPILER_CC=clang" >> $GITHUB_ENV

          elif [[ "$CHOICE" == *"r450784d"* ]]; then
            mkdir -p clang-r450784d
            curl -L "https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/android13-release/clang-r450784d.tar.gz" -o c.tar.gz
            tar -xzf c.tar.gz -C clang-r450784d
            echo "COMPILER_PATH=${GITHUB_WORKSPACE}/toolchains/clang-r450784d/bin" >> $GITHUB_ENV
            echo "COMPILER_CC=clang" >> $GITHUB_ENV

          elif [[ "$CHOICE" == *"clang-22"* ]]; then
            curl -fsSL https://apt.llvm.org/llvm-snapshot.gpg.key | sudo gpg --dearmor -o /usr/share/keyrings/llvm-archive-keyring.gpg
            echo "deb [signed-by=/usr/share/keyrings/llvm-archive-keyring.gpg] http://apt.llvm.org/noble/ llvm-toolchain-noble-22 main" | sudo tee /etc/apt/sources.list.d/llvm.list
            sudo apt-get update -y && sudo apt-get install -y clang-22 llvm-22 lld-22
            sudo ln -sf /usr/bin/clang-22 /usr/bin/clang || true
            sudo ln -sf /usr/bin/ld.lld-22 /usr/bin/ld.lld || true
            echo "COMPILER_PATH=/usr/bin" >> $GITHUB_ENV
            echo "COMPILER_CC=clang-22" >> $GITHUB_ENV

          elif [[ "$CHOICE" == *"Neutron"* ]]; then
            mkdir -p neutron && cd neutron
            curl -LO "https://raw.githubusercontent.com/Neutron-Toolchains/antman/main/antman"
            chmod +x antman && ./antman -S
            echo "COMPILER_PATH=${GITHUB_WORKSPACE}/toolchains/neutron/bin" >> $GITHUB_ENV
            echo "COMPILER_CC=clang" >> $GITHUB_ENV
          fi

      - name: ⬇️ Download AOSP Build Tools
        if: env.USE_BUILD_SCRIPT == 'false'
        run: |
          git clone --depth=1 -b main \
            https://android.googlesource.com/kernel/prebuilts/build-tools \
            ${GITHUB_WORKSPACE}/toolchains/build-tools
          echo "AOSP_TOOLS_PATH=${GITHUB_WORKSPACE}/toolchains/build-tools/linux-x86/bin" >> $GITHUB_ENV

      # ==========================================
      # 1. ROOT MANAGER
      # ==========================================

      - name: 🛡️ Inject Root Manager
        run: |
          cd ${KERNEL_ROOT}
          MANAGER="${{ github.event.inputs.ROOT_MANAGER }}"
          RUN_PATCH="${{ github.event.inputs.PATCH_ROOT_MANAGER }}"

          if [[ "$MANAGER" == *"None"* ]]; then
            echo ">>> Skipping Root Manager."
            exit 0
          fi

          if [ "$RUN_PATCH" == "true" ]; then
            echo ">>> Running setup.sh for $MANAGER..."
            if [[ "$MANAGER" == *"Wild_KSU"* ]]; then
              curl -LSs "https://raw.githubusercontent.com/WildKernels/Wild_KSU/wild/kernel/setup.sh" | bash -s wild
            elif [[ "$MANAGER" == *"ReSukiSU"* ]]; then
              curl -LSs "https://raw.githubusercontent.com/ReSukiSU/ReSukiSU/main/kernel/setup.sh" | bash
            elif [[ "$MANAGER" == *"KernelSU-Next"* ]]; then
              curl -LSs "https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/next/kernel/setup.sh" | bash -
            elif [[ "$MANAGER" == *"KernelSU (Official)"* ]]; then
              curl -LSs "https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/setup.sh" | bash -
            fi
          else
            echo ">>> Manual clone for $MANAGER..."
            rm -rf KernelSU
            if [[ "$MANAGER" == *"Wild_KSU"* ]]; then
              git clone -b wild https://github.com/WildKernels/Wild_KSU.git KernelSU
            elif [[ "$MANAGER" == *"ReSukiSU"* ]]; then
              git clone https://github.com/ReSukiSU/ReSukiSU.git KernelSU
            elif [[ "$MANAGER" == *"KernelSU-Next"* ]]; then
              git clone -b next https://github.com/KernelSU-Next/KernelSU-Next.git KernelSU
            elif [[ "$MANAGER" == *"KernelSU (Official)"* ]]; then
              git clone https://github.com/tiann/KernelSU.git KernelSU
            fi
            rm -rf drivers/kernelsu && mkdir -p drivers/kernelsu
            if [ -d "KernelSU/kernel" ]; then
              cp -r KernelSU/kernel/* drivers/kernelsu/
            else
              cp -r KernelSU/* drivers/kernelsu/
            fi
          fi
          echo "✅ Root Manager setup complete."

      - name: 🔢 Detect KSU Version
        run: |
          cd ${KERNEL_ROOT}
          KSU_DIR=""
          for d in Wild_KSU/kernel KernelSU/kernel drivers/kernelsu; do
            if [ -d "$d" ] && [ -f "$d/Kbuild" ]; then
              KSU_DIR="$d"; break
            fi
          done

          if [ -z "$KSU_DIR" ]; then
            echo "KSU_VERSION=unknown" >> $GITHUB_ENV
            echo "KSU_VERSION_TAG=unknown" >> $GITHUB_ENV
            exit 0
          fi

          cd "$KSU_DIR"
          BASE_VERSION=30000
          if [ -d ".git" ] || git rev-parse --git-dir >/dev/null 2>&1; then
            git fetch --unshallow 2>/dev/null || true
            KSU_GIT_VERSION=$(git rev-list --count HEAD 2>/dev/null || echo "0")
            KSU_VERSION=$((BASE_VERSION + KSU_GIT_VERSION))
            KSU_GIT_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.1")
          else
            KSU_VERSION=33208
            KSU_GIT_TAG="v3.1.2"
          fi

          echo "KSU_VERSION=$KSU_VERSION" >> $GITHUB_ENV
          echo "KSU_VERSION_TAG=$KSU_GIT_TAG" >> $GITHUB_ENV

          if [ -f "Kbuild" ]; then
            sed -i "s/KSU_VERSION_FALLBACK := [0-9]\+/KSU_VERSION_FALLBACK := ${KSU_VERSION}/" Kbuild
            sed -i "s/KSU_VERSION_TAG_FALLBACK := .*/KSU_VERSION_TAG_FALLBACK := ${KSU_GIT_TAG}/" Kbuild
          fi
          echo "✅ KSU Version: $KSU_VERSION ($KSU_GIT_TAG)"

      # ==========================================
      # 2. SUSFS
      # ==========================================

      - name: 🧩 Download & Apply SUSFS Patches
        if: github.event.inputs.ENABLE_SUSFS == 'true'
        run: |
          cd ${KERNEL_ROOT}
          SUSFS4KSU="${GITHUB_WORKSPACE}/susfs4ksu"

          git clone -b ${{ github.event.inputs.SUSFS_BRANCH }} \
            https://gitlab.com/simonpunk/susfs4ksu.git "$SUSFS4KSU"

          # Pin to tested commit
          cd "$SUSFS4KSU"
          BRANCH="${{ github.event.inputs.SUSFS_BRANCH }}"
          case "$BRANCH" in
            gki-android13-5.15) git checkout f20b72ca8c5214275af2cd969c58d8054a761353 ;;
            gki-android14-6.1)  git checkout eab9a5ed3184c8f0c8ae1a2eb1863d1f0ae7fac3 ;;
            gki-android15-6.6)  git checkout f17b8be07a95217d89a76cf527f9e8bd937539d7 ;;
            gki-android12-5.10) git checkout 44ba5277006c088caeec4a760304e756ed614cde ;;
            gki-android13-5.10) git checkout 27c47e0f172191faab8da61ab03636a131f736c0 ;;
          esac
          cd ${KERNEL_ROOT}

          # Copy SUSFS source files
          cp "$SUSFS4KSU/kernel_patches/fs/"* ./fs/ 2>/dev/null || true
          cp "$SUSFS4KSU/kernel_patches/include/linux/"* ./include/linux/ 2>/dev/null || true

          # Apply main SUSFS patch
          PATCH_NAME="50_add_susfs_in_${{ github.event.inputs.SUSFS_BRANCH }}.patch"
          SUSFS_PATCH="$SUSFS4KSU/kernel_patches/${PATCH_NAME}"

          if [ -f "$SUSFS_PATCH" ]; then
            cp "$SUSFS_PATCH" ./
            patch -p1 --forward < "$PATCH_NAME" || echo "⚠️ Some hunks failed — device fixes should resolve them."
            rm -f "$PATCH_NAME"
          else
            FALLBACK=$(find "$SUSFS4KSU" -name "50_add_susfs_in_*.patch" | head -n 1)
            if [ -n "$FALLBACK" ]; then
              patch -p1 --forward < "$FALLBACK" || echo "⚠️ Fallback had issues."
            fi
          fi

          # Maco fix
          MAC_PATCH=$(find "$SUSFS4KSU" -name "51_susfs_add_maco_fix_*.patch" | head -n 1)
          if [ -n "$MAC_PATCH" ]; then
            patch -p1 --forward < "$MAC_PATCH" || echo "⚠️ Maco patch skipped."
          fi

      - name: 🔧 Apply Device-Specific SUSFS Fixes
        if: github.event.inputs.ENABLE_SUSFS == 'true' && github.event.inputs.ENABLE_SUSFS_DEVICE_FIXES == 'true'
        run: |
          cd ${KERNEL_ROOT}
          PATCHES_DIR="${GITHUB_WORKSPACE}/kernel_patches"

          git clone --depth=1 https://github.com/WildKernels/kernel_patches.git "$PATCHES_DIR"

          FIX_DIR="$PATCHES_DIR/${{ github.event.inputs.SUSFS_DEVICE_FIXES_PATH }}"

          if [ -d "$FIX_DIR" ]; then
            cp "$FIX_DIR/"*.patch ./ 2>/dev/null || true
            for p in *.patch; do
              if [ -f "$p" ] && [[ "$p" != "50_add_susfs"* ]]; then
                echo "  Applying: $p"
                patch -p1 --forward < "$p" || echo "  ⚠️ $p had issues."
              fi
            done
            rm -f *.patch
          else
            echo "🚨 WARNING: Fix dir not found: $FIX_DIR"
          fi

      # ==========================================
      # 3. BBG
      # ==========================================

      - name: 🔒 Inject Baseband Guard (BBG)
        if: github.event.inputs.ENABLE_BBG == 'true'
        run: |
          cd ${KERNEL_ROOT}
          curl -LSs https://github.com/vc-teahouse/Baseband-guard/raw/main/setup.sh | bash

          # Determine defconfig
          if [ -n "${{ github.event.inputs.CUSTOM_DEFCONFIG_URL }}" ] && [ -f "arch/arm64/configs/custom_base_defconfig" ]; then
            DEFCONFIG_FILE="arch/arm64/configs/custom_base_defconfig"
          else
            DEFCONFIG_FILE="arch/arm64/configs/${DEFCONFIG_NAME}_defconfig"
          fi

          if [ -f "$DEFCONFIG_FILE" ]; then
            echo "CONFIG_BBG=y" >> "$DEFCONFIG_FILE"
            echo "CONFIG_LOG_BUF_SHIFT=20" >> "$DEFCONFIG_FILE"
          fi

          sed -i '/^config LSM$/,/^help$/{ /^[[:space:]]*default/ { /baseband_guard/! s/selinux/selinux,baseband_guard/ } }' security/Kconfig || true

          BBG_C=$(find . -path ./susfs4ksu -prune -o -name "baseband_guard.c" -print | head -n 1)
          if [ -n "$BBG_C" ] && grep -q "get_link(dentry, inode, NULL)" "$BBG_C"; then
            PATCHES_DIR="${GITHUB_WORKSPACE}/kernel_patches"
            if [ -f "$PATCHES_DIR/experimental/bbg/bbg_fix_get_link.patch" ]; then
              patch -p1 --forward < "$PATCHES_DIR/experimental/bbg/bbg_fix_get_link.patch"
            else
              curl -LSs "https://raw.githubusercontent.com/WildKernels/kernel_patches/main/experimental/bbg/bbg_fix_get_link.patch" -o bbg_fix.patch
              patch -p1 --forward < bbg_fix.patch && rm -f bbg_fix.patch
            fi
          fi

      # ==========================================
      # CONFIGURATION
      # ==========================================

      - name: 📝 Generate su.config
        if: github.event.inputs.ENABLE_SU_CONFIG == 'true'
        run: |
          cd ${KERNEL_ROOT}
          cat > arch/arm64/configs/su.config << 'SUEOF'
          CONFIG_KPROBES=y
          CONFIG_KPROBE_EVENTS=y
          CONFIG_HAVE_KPROBES=y
          CONFIG_KSU=y
          CONFIG_KSU_SUSFS=y
          CONFIG_KSU_SUSFS_SUS_OVERLAYFS=y
          CONFIG_KSU_SUSFS_SUS_MAP=y
          CONFIG_KSU_SUSFS_SUS_PATH=y
          CONFIG_KSU_SUSFS_SUS_MOUNT=y
          CONFIG_KSU_SUSFS_SUS_KSTAT=y
          CONFIG_KSU_SUSFS_AUTO_ADD_SUS_KSU_DEFAULT_MOUNT=y
          CONFIG_KSU_SUSFS_AUTO_ADD_SUS_BIND_MOUNT=y
          CONFIG_KSU_SUSFS_TRY_UMOUNT=y
          CONFIG_KSU_SUSFS_AUTO_ADD_TRY_UMOUNT_FOR_BIND_MOUNT=y
          CONFIG_KSU_SUSFS_SPOOF_UNAME=y
          CONFIG_KSU_SUSFS_ENABLE_LOG=y
          CONFIG_KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS=y
          CONFIG_KSU_SUSFS_SPOOF_CMDLINE_OR_BOOTCONFIG=y
          CONFIG_KSU_SUSFS_OPEN_REDIRECT=y
          CONFIG_KSU_MULTI_MANAGER_SUPPORT=y
          CONFIG_TMPFS_XATTR=y
          CONFIG_TMPFS_POSIX_ACL=y
          CONFIG_UH=n
          CONFIG_UH_RKP=n
          CONFIG_UH_LKMAUTH=n
          CONFIG_UH_LKM_BLOCK=n
          CONFIG_RKP_CFP_JOPP=n
          CONFIG_RKP_CFP=n
          CONFIG_RKP=n
          CONFIG_KDP=n
          CONFIG_KDP_NS=n
          CONFIG_SECURITY_DEFEX=n
          CONFIG_PROCA=n
          CONFIG_FIVE=n
          CONFIG_SAMSUNG_TUI=n
          CONFIG_STUI=n
          CONFIG_MODULES=y
          CONFIG_MODULE_FORCE_LOAD=y
          CONFIG_MODULE_UNLOAD=y
          CONFIG_MODULE_FORCE_UNLOAD=y
          CONFIG_MODVERSIONS=y
          CONFIG_MODULE_SRCVERSION_ALL=n
          CONFIG_MODULE_SIG=n
          CONFIG_MODULE_COMPRESS=n
          CONFIG_TRIM_UNUSED_KSYMS=n
          SUEOF
          # CRITICAL: Strip leading whitespace from config lines
          sed -i 's/^[[:space:]]*//' arch/arm64/configs/su.config

      - name: 📥 Fetch Custom Defconfig (if provided)
        if: github.event.inputs.CUSTOM_DEFCONFIG_URL != ''
        run: |
          cd ${KERNEL_ROOT}/arch/arm64/configs/
          URL="${{ github.event.inputs.CUSTOM_DEFCONFIG_URL }}"
          RAW_URL=$(echo "$URL" | sed 's|github.com|raw.githubusercontent.com|' | sed 's|/blob/|/|')
          curl -LSs "$RAW_URL" -o custom_base_defconfig
          sed -i 's/^[[:space:]]*//' custom_base_defconfig

      - name: ⚙️ Merge Configs into Defconfig
        run: |
          cd ${KERNEL_ROOT}

          # Determine active defconfig
          if [ -f "arch/arm64/configs/custom_base_defconfig" ]; then
            ACTIVE_DEFCONFIG="arch/arm64/configs/custom_base_defconfig"
          else
            ACTIVE_DEFCONFIG="arch/arm64/configs/${DEFCONFIG_NAME}_defconfig"
          fi
          echo ">>> Active defconfig: $ACTIVE_DEFCONFIG"

          # For build_kernel.sh: merge fragment configs directly into defconfig
          # For manual make: fragments are passed as args later
          if [ "$USE_BUILD_SCRIPT" == "true" ]; then
            for cfg in su.config perf.config nethunter.config custom.config; do
              TOGGLE_VAR=""
              case "$cfg" in
                su.config)        TOGGLE_VAR="${{ github.event.inputs.ENABLE_SU_CONFIG }}" ;;
                perf.config)      TOGGLE_VAR="${{ github.event.inputs.ENABLE_PERF_CONFIG }}" ;;
                nethunter.config) TOGGLE_VAR="${{ github.event.inputs.ENABLE_NETHUNTER_CONFIG }}" ;;
                custom.config)    TOGGLE_VAR="${{ github.event.inputs.ENABLE_CUSTOM_CONFIG }}" ;;
              esac
              if [ "$TOGGLE_VAR" == "true" ] && [ -f "arch/arm64/configs/$cfg" ]; then
                echo ">>> Merging $cfg into defconfig"
                cat "arch/arm64/configs/$cfg" >> "$ACTIVE_DEFCONFIG"
              fi
            done
          fi

          # Remove check_defconfig
          [ -f "build.config.gki" ] && sed -i 's/check_defconfig//' build.config.gki || true

      - name: ✏️ Customize Kernel Name
        run: |
          cd ${KERNEL_ROOT}
          SUFFIX="${{ github.event.inputs.KERNEL_SUFFIX }}"

          if [ -n "$SUFFIX" ] && [ -f "scripts/setlocalversion" ]; then
            sed -i "\$s|echo \"\\\$res\"|echo \"\\\$res${SUFFIX}\"|" scripts/setlocalversion
          fi

          # Fixed build timestamp
          if [ -f "scripts/mkcompile_h" ]; then
            BTIME=$(date -u '+%a %b %d %H:%M:%S UTC %Y')
            perl -pi -e "s{UTS_VERSION=\"\\\$\\(echo \\\$UTS_VERSION \\\$CONFIG_FLAGS \\\$TIMESTAMP \\| cut -b -\\\$UTS_LEN\\)\"}{UTS_VERSION=\"#1 SMP PREEMPT ${BTIME}\"}" scripts/mkcompile_h 2>/dev/null || true
          fi

          # Remove ABI exports
          rm -rf android/abi_gki_protected_exports_* 2>/dev/null || true
          [ -f "BUILD.bazel" ] && perl -pi -e 's/^\s*"protected_exports_list"\s*:\s*"android\/abi_gki_protected_exports_aarch64",\s*$//;' BUILD.bazel 2>/dev/null || true

      - name: 🧼 Clean Dirty Flags
        run: |
          cd ${KERNEL_ROOT}
          [ -f "scripts/setlocalversion" ] && sed -i 's/-dirty//' scripts/setlocalversion || true

      # ==========================================
      # BUILD
      # ==========================================

      - name: 🔨 Compile Kernel
        run: |
          set -euo pipefail
          cd ${KERNEL_ROOT}

          if [ "$USE_BUILD_SCRIPT" == "true" ]; then
            echo ">>> Building with build_kernel.sh (LTO=${LTO_TYPE})..."
            if [ -f "build_kernel.sh" ]; then
              chmod +x build_kernel.sh
              LTO=${LTO_TYPE} ./build_kernel.sh 2>&1 | tee build.log || true
            elif [ -f "build_kernel_GKI.sh" ]; then
              chmod +x build_kernel_GKI.sh
              LTO=${LTO_TYPE} ./build_kernel_GKI.sh 2>&1 | tee build.log || true
            else
              echo "🚨 No build script found!" && exit 1
            fi
          else
            echo ">>> Building with manual make..."
            mkdir -p ${OUTDIR}
            export PATH="${COMPILER_PATH}:${AOSP_TOOLS_PATH}:$PATH"
            export CC="${COMPILER_CC}" LD=ld.lld
            export CROSS_COMPILE=aarch64-linux-gnu-
            export CROSS_COMPILE_COMPAT=arm-linux-gnueabi-
            export LLVM=1 LLVM_IAS=1 DTC_FLAGS="-@"
            export KCFLAGS="-Wno-unused-variable -Wno-implicit-int"

            if [ -f "arch/arm64/configs/custom_base_defconfig" ]; then
              CFG="custom_base_defconfig"
            else
              CFG="${DEFCONFIG_NAME}_defconfig"
            fi

            [ "${{ github.event.inputs.ENABLE_SU_CONFIG }}" == "true" ] && [ -f "arch/arm64/configs/su.config" ] && CFG="$CFG su.config"
            [ "${{ github.event.inputs.ENABLE_PERF_CONFIG }}" == "true" ] && [ -f "arch/arm64/configs/perf.config" ] && CFG="$CFG perf.config"
            [ "${{ github.event.inputs.ENABLE_NETHUNTER_CONFIG }}" == "true" ] && [ -f "arch/arm64/configs/nethunter.config" ] && CFG="$CFG nethunter.config"
            [ "${{ github.event.inputs.ENABLE_CUSTOM_CONFIG }}" == "true" ] && [ -f "arch/arm64/configs/custom.config" ] && CFG="$CFG custom.config"

            echo ">>> Config: $CFG"
            make O="${OUTDIR}" CC="${CC}" $CFG
            make -j$(nproc --all) O="${OUTDIR}" CC="${CC}" 2>&1 | tee build.log
          fi

      - name: 🧩 Compile & Strip Modules
        if: env.USE_BUILD_SCRIPT == 'false'
        run: |
          cd ${KERNEL_ROOT}
          mkdir -p ${MODULES_OUTDIR}
          export PATH="${COMPILER_PATH}:${AOSP_TOOLS_PATH}:$PATH"
          export CC="${COMPILER_CC}" LD=ld.lld CROSS_COMPILE=aarch64-linux-gnu-
          export KCFLAGS="-Wno-unused-variable -Wno-implicit-int"
          make -j$(nproc --all) O="${OUTDIR}" CC="${CC}" \
            INSTALL_MOD_STRIP="--strip-debug --keep-section=.ARM.attributes" \
            INSTALL_MOD_PATH="${MODULES_OUTDIR}" modules_install 2>&1 | tee -a build.log || true

      # ==========================================
      # PACKAGING
      # ==========================================

      - name: 📦 Locate Kernel Image
        id: find_image
        run: |
          cd ${KERNEL_ROOT}
          IMAGE=""
          for f in \
            arch/arm64/boot/Image \
            out/arch/arm64/boot/Image \
            "${OUTDIR}/arch/arm64/boot/Image" \
            kernel_platform/sec/dist/Image \
            kernel_platform/gki/dist/Image; do
            if [ -f "$f" ]; then IMAGE="$(realpath "$f")"; break; fi
          done

          if [ -n "$IMAGE" ]; then
            echo "✅ Image found: $IMAGE"
            echo "IMAGE_PATH=$IMAGE" >> $GITHUB_ENV
            echo "image_found=true" >> $GITHUB_OUTPUT
          else
            echo "🚨 Image not found!"
            find . -name "Image" -type f 2>/dev/null || true
            echo "image_found=false" >> $GITHUB_OUTPUT
            exit 1
          fi

      - name: 📦 Package AnyKernel3
        if: steps.find_image.outputs.image_found == 'true'
        run: |
          cp "$IMAGE_PATH" ${GITHUB_WORKSPACE}/AnyKernel3/Image

      - name: 📦 Package Artifacts
        if: steps.find_image.outputs.image_found == 'true'
        run: |
          mkdir -p ${GITHUB_WORKSPACE}/artifacts/kernel
          cp "$IMAGE_PATH" ${GITHUB_WORKSPACE}/artifacts/kernel/
          [ -d "${MODULES_OUTDIR}/lib" ] && tar -C "${MODULES_OUTDIR}" -czf "${GITHUB_WORKSPACE}/artifacts/modules_out.tgz" lib || true
          [ -f "${KERNEL_ROOT}/build.log" ] && tail -200 "${KERNEL_ROOT}/build.log" > ${GITHUB_WORKSPACE}/artifacts/build_tail.log || true

      # ==========================================
      # DIAGNOSTICS
      # ==========================================

      - name: 🔍 Scan Patch Rejects
        if: always()
        run: |
          RDIR="${GITHUB_WORKSPACE}/patch-rejects"
          mkdir -p "$RDIR"
          mapfile -t REJS < <(find "${KERNEL_ROOT}" -type f -name '*.rej' 2>/dev/null)
          echo "REJ_COUNT=${#REJS[@]}" >> $GITHUB_ENV
          for R in "${REJS[@]}"; do
            REL="${R#"${KERNEL_ROOT}"/}"
            mkdir -p "$(dirname "$RDIR/$REL")"
            cp "$R" "$RDIR/$REL"
            ORIG="${R%.rej}"
            [ -f "$ORIG" ] && cp "$ORIG" "$RDIR/${REL%.rej}" || true
            echo "$REL" >> "$RDIR/index.txt"
          done

      - name: 📋 Build Summary
        if: always()
        run: |
          cat >> $GITHUB_STEP_SUMMARY << SUMMARY
          # 🏗️ Build Summary
          | Setting | Value |
          |---------|-------|
          | **Device** | ${{ github.event.inputs.DEVICE }} |
          | **Branch** | ${{ github.event.inputs.KERNEL_BRANCH }} |
          | **Build Method** | ${{ github.event.inputs.BUILD_METHOD }} |
          | **Root Manager** | ${{ github.event.inputs.ROOT_MANAGER }} |
          | **KSU Version** | ${KSU_VERSION:-unknown} (${KSU_VERSION_TAG:-unknown}) |
          | **SUSFS** | ${{ github.event.inputs.ENABLE_SUSFS }} |
          | **BBG** | ${{ github.event.inputs.ENABLE_BBG }} |
          | **Patch Rejects** | ${REJ_COUNT:-0} |
          SUMMARY

      # ==========================================
      # UPLOADS
      # ==========================================

      - name: ⬆️ Upload AnyKernel3
        if: steps.find_image.outputs.image_found == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.DEVICE }}-${{ github.event.inputs.KERNEL_BRANCH }}-AnyKernel3
          path: ${{ github.workspace }}/AnyKernel3/**
          compression-level: 9
          retention-days: 7

      - name: ⬆️ Upload Kernel Build
        if: steps.find_image.outputs.image_found == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.DEVICE }}-${{ github.event.inputs.KERNEL_BRANCH }}-kernel-build
          path: ${{ github.workspace }}/artifacts/
          retention-days: 7

      - name: ⬆️ Upload Patch Rejects
        if: always() && env.REJ_COUNT != '0'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.DEVICE }}-${{ github.event.inputs.KERNEL_BRANCH }}-Rejected-Patches
          path: ${{ github.workspace }}/patch-rejects/
          retention-days: 7
