name: 🏗️ BBG SUSFS ROOT (s5e8535 / M14 - Universal)

on:
  workflow_dispatch:
    inputs:
      KERNEL_SOURCE:
        description: 'Kernel Source URL'
        required: true
        default: 'https://github.com/MrPankaj24/kernel_common_modifications'
      KERNEL_BRANCH:
        description: 'Kernel Branch'
        required: true
        default: 'basic'
      CLANG_VERSION:
        description: 'Select Compiler Toolchain'
        type: choice
        options:
          - 'clang-r487747c (AOSP - Android 14 Stable)'
          - 'clang-r450784d (AOSP - Android 13 Release)'
          - 'clang-22 (LLVM Official APT Repo)'
          - 'clang-20 (Neutron Toolchain)'
        default: 'clang-r487747c (AOSP - Android 14 Stable)'
      DEVICE:
        description: 'Device Codename (Used as default defconfig if custom is disabled)'
        required: true
        default: 'm14x'

      # --- ROOT MANAGER TOGGLES ---
      ROOT_MANAGER:
        description: 'Select Root Manager'
        type: choice
        options:
          - 'ReSukiSU'
          - 'KernelSU-Next'
          - 'Wild_KSU'
          - 'KernelSU (Official)'
          - 'None / Skip'
        default: 'ReSukiSU'
      PATCH_ROOT_MANAGER:
        description: 'Execute setup.sh script? (CHECK for clean untouched sources)'
        type: boolean
        default: false
        
      # --- SUSFS SOURCE PATCHING ---
      ENABLE_SUSFS:
        description: 'Download & Apply SUSFS Patches? (UNCHECK if your source is already patched)'
        type: boolean
        default: false
      SUSFS_BRANCH:
        description: 'SUSFS Branch to clone'
        required: false
        default: 'gki-android13-5.15'

      # --- SUSFS DEVICE FIXES (.rej resolution) ---
      ENABLE_SUSFS_DEVICE_FIXES:
        description: 'Enable Device-Specific SUSFS Fixes (for .rej files)?'
        type: boolean
        default: false
      SUSFS_DEVICE_FIXES_REPO:
        description: 'Repo containing device fixes'
        required: false
        default: 'https://github.com/WildKernels/kernel_patches'
      SUSFS_DEVICE_FIXES_PATH:
        description: 'Path inside repo to the .patch files'
        required: false
        default: 'samsung/SM-M146B-Oneui7-ADYJ2'
        
      # --- INDIVIDUAL CONFIG TOGGLES ---
      ENABLE_CUSTOM_DEFCONFIG:
        description: 'Override base defconfig with Custom URL?'
        type: boolean
        default: false
      CUSTOM_DEFCONFIG_URL:
        description: 'URL for Custom Base Defconfig'
        required: false
        default: ''
        
      ENABLE_SU_CONFIG:
        description: 'Enable Generated su.config (SUSFS & Anti-Root Bypass)?'
        type: boolean
        default: true
      ENABLE_PERF_CONFIG:
        description: 'Enable perf.config?'
        type: boolean
        default: true
      PERF_CONFIG_URL:
        description: 'URL for perf.config'
        required: false
        default: 'https://github.com/MrPankaj24/kernel_common_modifications/blob/basic/arch/arm64/configs/perf.config'
      ENABLE_NETHUNTER_CONFIG:
        description: 'Enable nethunter.config?'
        type: boolean
        default: true
      NETHUNTER_CONFIG_URL:
        description: 'URL for nethunter.config'
        required: false
        default: 'https://github.com/MrPankaj24/kernel_common_modifications/blob/basic/arch/arm64/configs/nethunter.config'
      ENABLE_CUSTOM_CONFIG:
        description: 'Enable custom.config?'
        type: boolean
        default: true
      CUSTOM_CONFIG_URL:
        description: 'URL for custom.config'
        required: false
        default: 'https://github.com/MrPankaj24/kernel_common_modifications/blob/basic/arch/arm64/configs/custom.config'

jobs:
  build:
    name: 🏗️ Build Kernel (${{ github.event.inputs.DEVICE }})
    runs-on: ubuntu-24.04
    timeout-minutes: 120

    env:
      KERNEL_ROOT: ${{ github.workspace }}/kernel_workspace
      OUTDIR: ${{ github.workspace }}/kernel_workspace/out
      MODULES_OUTDIR: ${{ github.workspace }}/kernel_workspace/modules_out
      FINAL_STAGING: ${{ github.workspace }}/staging
      TARGET_SOC: s5e8535
      PLATFORM_VERSION: 15
      ANDROID_MAJOR_VERSION: v
      ARCH: arm64
      SUBARCH: arm64

    steps:
      - name: 📥 Checkout Workflow Repository
        uses: actions/checkout@v4

      - name: 📦 Install Build Dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y --no-install-recommends \
            build-essential make bc libncurses-dev bison flex \
            python3 python3-setuptools python-is-python3 git ccache rsync \
            libssl-dev libelf-dev dwarves device-tree-compiler \
            file gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu sudo \
            lz4 zstd cpio curl wget zip unzip

      - name: 🧹 Prepare Workspace Directories
        run: |
          set -euo pipefail
          rm -rf "${KERNEL_ROOT}" "${FINAL_STAGING}"
          mkdir -p "${KERNEL_ROOT}"
          mkdir -p "${FINAL_STAGING}/lib/modules/0.0"

      - name: 📥 Clone Kernel Source
        run: |
          echo ">>> Cloning Kernel Source: ${{ github.event.inputs.KERNEL_BRANCH }}"
          git clone --depth=1 -b ${{ github.event.inputs.KERNEL_BRANCH }} ${{ github.event.inputs.KERNEL_SOURCE }} ${KERNEL_ROOT}

      - name: 🔧 Setup Toolchain (${{ github.event.inputs.CLANG_VERSION }})
        run: |
          set -euo pipefail
          mkdir -p ${GITHUB_WORKSPACE}/toolchains
          cd ${GITHUB_WORKSPACE}/toolchains
          
          CHOICE="${{ github.event.inputs.CLANG_VERSION }}"
          if [[ "$CHOICE" == *"AOSP"* ]]; then
            CLANG_VER=$(echo "$CHOICE" | awk '{print $1}')
            if [[ "$CLANG_VER" == "clang-r487747c" ]]; then
              DL_URL="https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/tags/android-14.0.0_r1/${CLANG_VER}.tar.gz"
            else
              DL_URL="https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/android13-release/${CLANG_VER}.tar.gz"
            fi
            mkdir -p ${CLANG_VER}
            curl -L "$DL_URL" -o clang.tar.gz
            tar -xzf clang.tar.gz -C ${CLANG_VER}
            echo "COMPILER_PATH=${GITHUB_WORKSPACE}/toolchains/${CLANG_VER}/bin" >> $GITHUB_ENV
            echo "COMPILER_CC=clang" >> $GITHUB_ENV
          elif [[ "$CHOICE" == *"clang-22"* ]]; then
            curl -fsSL https://apt.llvm.org/llvm-snapshot.gpg.key | sudo gpg --dearmor -o /usr/share/keyrings/llvm-archive-keyring.gpg
            echo "deb [signed-by=/usr/share/keyrings/llvm-archive-keyring.gpg] http://apt.llvm.org/noble/ llvm-toolchain-noble-22 main" | sudo tee /etc/apt/sources.list.d/llvm.list
            sudo apt-get update -y
            sudo apt-get install -y clang-22 llvm-22 lld-22
            sudo ln -sf /usr/bin/clang-22 /usr/bin/clang || true
            sudo ln -sf /usr/bin/ld.lld-22 /usr/bin/ld.lld || true
            echo "COMPILER_PATH=/usr/bin" >> $GITHUB_ENV
            echo "COMPILER_CC=clang-22" >> $GITHUB_ENV
          elif [[ "$CHOICE" == *"Neutron"* ]]; then
            mkdir -p neutron && cd neutron
            curl -LO "https://raw.githubusercontent.com/Neutron-Toolchains/antman/main/antman"
            chmod +x antman && ./antman -S
            echo "COMPILER_PATH=${GITHUB_WORKSPACE}/toolchains/neutron/bin" >> $GITHUB_ENV
            echo "COMPILER_CC=clang" >> $GITHUB_ENV
          fi

      - name: ⬇️ Download AOSP Kernel Build Tools
        run: |
          git clone --depth=1 -b main https://android.googlesource.com/kernel/prebuilts/build-tools ${GITHUB_WORKSPACE}/toolchains/build-tools
          echo "AOSP_TOOLS_PATH=${GITHUB_WORKSPACE}/toolchains/build-tools/linux-x86/bin" >> $GITHUB_ENV

      - name: 📝 Generate Clean su.config
        if: github.event.inputs.ENABLE_SU_CONFIG == 'true'
        run: |
          cd ${KERNEL_ROOT}
          echo ">>> Generating new su.config with all SUSFS features forced to 'y'..."
          cat > arch/arm64/configs/su.config << 'EOF'
          CONFIG_KPROBES=y
          CONFIG_KPROBE_EVENTS=y
          CONFIG_HAVE_KPROBES=y
          CONFIG_KSU_TRACEPOINT_HOOK=n
          CONFIG_KSU_MANUAL_HOOK=y
          CONFIG_KSU=y
          CONFIG_KSU_MULTI_MANAGER_SUPPORT=y
          CONFIG_KSU_SUSFS=y
          CONFIG_KSU_SUSFS_SUS_OVERLAYFS=y
          CONFIG_KSU_SUSFS_SUS_MAP=y
          CONFIG_KSU_SUSFS_SUS_PATH=y
          CONFIG_KSU_SUSFS_SUS_MOUNT=y
          CONFIG_KSU_SUSFS_SUS_KSTAT=y
          CONFIG_KSU_SUSFS_AUTO_ADD_SUS_KSU_DEFAULT_MOUNT=y
          CONFIG_KSU_SUSFS_AUTO_ADD_SUS_BIND_MOUNT=y
          CONFIG_KSU_SUSFS_TRY_UMOUNT=y
          CONFIG_KSU_SUSFS_AUTO_ADD_TRY_UMOUNT_FOR_BIND_MOUNT=y
          CONFIG_KSU_SUSFS_SPOOF_UNAME=y
          CONFIG_KSU_SUSFS_ENABLE_LOG=y
          CONFIG_KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS=y
          CONFIG_KSU_SUSFS_SPOOF_CMDLINE_OR_BOOTCONFIG=y
          CONFIG_KSU_SUSFS_OPEN_REDIRECT=y
          
          # Disable Scamsung anti-root protection & Broken TEE/TUI Drivers
          CONFIG_UH=n
          CONFIG_RKP=n
          CONFIG_KDP=n
          CONFIG_SECURITY_DEFEX=n
          CONFIG_PROCA=n
          CONFIG_FIVE=n
          CONFIG_SAMSUNG_TUI=n
          CONFIG_STUI=n
          
          CONFIG_MODULES=y
          CONFIG_MODULE_FORCE_LOAD=y
          CONFIG_MODULE_UNLOAD=y
          CONFIG_MODULE_FORCE_UNLOAD=y
          CONFIG_MODVERSIONS=y
          CONFIG_MODULE_SRCVERSION_ALL=n
          CONFIG_MODULE_SIG=n
          CONFIG_MODULE_COMPRESS=n
          CONFIG_TRIM_UNUSED_KSYMS=n
          EOF

      - name: 📥 Fetch Extra Configs & Custom Defconfig
        run: |
          cd ${KERNEL_ROOT}/arch/arm64/configs/
          
          download_config() {
            local url="$1"
            local filename="$2"
            if [ -n "$url" ]; then
              local raw_url=$(echo "$url" | sed 's/github.com/raw.githubusercontent.com/' | sed 's/\/blob\//\//')
              echo ">>> Downloading $filename from $raw_url..."
              curl -LSs "$raw_url" -o "$filename"
            fi
          }

          if [ "${{ github.event.inputs.ENABLE_CUSTOM_DEFCONFIG }}" == "true" ]; then 
            download_config "${{ github.event.inputs.CUSTOM_DEFCONFIG_URL }}" "custom_base_defconfig"
          fi
          if [ "${{ github.event.inputs.ENABLE_PERF_CONFIG }}" == "true" ]; then 
            download_config "${{ github.event.inputs.PERF_CONFIG_URL }}" "perf.config"
          fi
          if [ "${{ github.event.inputs.ENABLE_NETHUNTER_CONFIG }}" == "true" ]; then 
            download_config "${{ github.event.inputs.NETHUNTER_CONFIG_URL }}" "nethunter.config"
          fi
          if [ "${{ github.event.inputs.ENABLE_CUSTOM_CONFIG }}" == "true" ]; then 
            download_config "${{ github.event.inputs.CUSTOM_CONFIG_URL }}" "custom.config"
          fi

      - name: 🧩 Download & Apply SUSFS Source & Fixes
        if: github.event.inputs.ENABLE_SUSFS == 'true'
        run: |
          cd ${KERNEL_ROOT}
          echo ">>> Cloning SUSFS Source branch: ${{ github.event.inputs.SUSFS_BRANCH }}..."
          git clone -b ${{ github.event.inputs.SUSFS_BRANCH }} https://gitlab.com/simonpunk/susfs4ksu.git susfs4ksu
          
          echo ">>> Copying SUSFS files into kernel tree..."
          cp -r susfs4ksu/kernel_patches/* ./ || true
          
          echo ">>> Automatically locating and applying SUSFS patch..."
          SUSFS_PATCH=$(find susfs4ksu -name "50_add_susfs_in_*.patch" | head -n 1)
          if [ -n "$SUSFS_PATCH" ]; then
            echo "Applying: $SUSFS_PATCH"
            patch -p1 --forward < "$SUSFS_PATCH" || echo "⚠️ Some generic chunks failed, relying on device-specific fixes..."
          fi
          
          MAC_PATCH=$(find susfs4ksu -name "51_susfs_add_maco_fix_*.patch" | head -n 1)
          if [ -n "$MAC_PATCH" ]; then
            echo "Applying Maco Fix: $MAC_PATCH"
            patch -p1 --forward < "$MAC_PATCH" || echo "⚠️ Maco patch skipped."
          fi

          if [ "${{ github.event.inputs.ENABLE_SUSFS_DEVICE_FIXES }}" == "true" ]; then
            echo ">>> Fetching device-specific SUSFS patches..."
            git clone --depth=1 ${{ github.event.inputs.SUSFS_DEVICE_FIXES_REPO }} wild_patches
            
            FIX_DIR="wild_patches/${{ github.event.inputs.SUSFS_DEVICE_FIXES_PATH }}"
            if [ -d "$FIX_DIR" ]; then
              echo ">>> Applying patches from $FIX_DIR..."
              for fix_patch in "$FIX_DIR"/*.patch; do
                if [ -f "$fix_patch" ]; then
                  echo "Applying fix: $fix_patch"
                  patch -p1 --forward < "$fix_patch" || echo "⚠️ Fix patch had issues or was already applied."
                fi
              done
            else
              echo "🚨 WARNING: Device patch directory $FIX_DIR not found!"
            fi
            rm -rf wild_patches
          fi

      - name: 🛡️ Inject Root Manager
        run: |
          cd ${KERNEL_ROOT}
          
          MANAGER_CHOICE="${{ github.event.inputs.ROOT_MANAGER }}"
          RUN_PATCH="${{ github.event.inputs.PATCH_ROOT_MANAGER }}"
          
          if [[ "$MANAGER_CHOICE" == *"None"* ]]; then
            echo ">>> Skipping Root Manager setup..."
          else
            if [ "$RUN_PATCH" == "true" ]; then
              echo ">>> Executing script to patch Kernel for $MANAGER_CHOICE..."
              if [[ "$MANAGER_CHOICE" == *"ReSukiSU"* ]]; then
                curl -LSs "https://raw.githubusercontent.com/ReSukiSU/ReSukiSU/main/kernel/setup.sh" | bash
              elif [[ "$MANAGER_CHOICE" == *"KernelSU-Next"* ]]; then
                curl -LSs "https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/next/kernel/setup.sh" | bash -
              elif [[ "$MANAGER_CHOICE" == *"Wild_KSU"* ]]; then
                curl -LSs "https://raw.githubusercontent.com/WildKernels/Wild_KSU/wild/kernel/setup.sh" | bash -s wild
              elif [[ "$MANAGER_CHOICE" == *"KernelSU (Official)"* ]]; then
                curl -LSs "https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/setup.sh" | bash -
              fi
            else
              echo ">>> Skipping patch script. Cloning $MANAGER_CHOICE directly..."
              rm -rf KernelSU
              if [[ "$MANAGER_CHOICE" == *"ReSukiSU"* ]]; then
                git clone https://github.com/ReSukiSU/ReSukiSU.git KernelSU
              elif [[ "$MANAGER_CHOICE" == *"KernelSU-Next"* ]]; then
                git clone -b next https://github.com/KernelSU-Next/KernelSU-Next.git KernelSU
              elif [[ "$MANAGER_CHOICE" == *"Wild_KSU"* ]]; then
                git clone -b wild https://github.com/WildKernels/Wild_KSU.git KernelSU
              elif [[ "$MANAGER_CHOICE" == *"KernelSU (Official)"* ]]; then
                git clone https://github.com/tiann/KernelSU.git KernelSU
              fi
            fi
            
            # --- THE PHYSICAL COPY FIX (No more fragile symlinks!) ---
            echo ">>> Physically copying KernelSU files to drivers/kernelsu..."
            rm -rf drivers/kernelsu
            mkdir -p drivers/kernelsu
            
            if [ -d "KernelSU/kernel" ]; then
              cp -r KernelSU/kernel/* drivers/kernelsu/
              echo "✅ Successfully copied KernelSU/kernel directly into drivers/kernelsu!"
            elif [ -d "KernelSU" ]; then
              cp -r KernelSU/* drivers/kernelsu/
              echo "✅ Successfully copied KernelSU directly into drivers/kernelsu!"
            else
              echo "🚨 ERROR: Root Manager source not found after cloning!"
              exit 1
            fi
          fi

      - name: 🔒 Inject Baseband Guard (BBG)
        run: |
          cd ${KERNEL_ROOT}
          curl -LSs https://github.com/vc-teahouse/Baseband-guard/raw/main/setup.sh | bash
          
          if [ "${{ github.event.inputs.ENABLE_CUSTOM_DEFCONFIG }}" == "true" ] && [ -f "arch/arm64/configs/custom_base_defconfig" ]; then
             DEFCONFIG_FILE="arch/arm64/configs/custom_base_defconfig"
          else
             DEFCONFIG_FILE="arch/arm64/configs/${{ github.event.inputs.DEVICE }}_defconfig"
          fi
          
          if [ -f "$DEFCONFIG_FILE" ]; then
            echo "CONFIG_BBG=y" >> "$DEFCONFIG_FILE"
            echo "CONFIG_LOG_BUF_SHIFT=20" >> "$DEFCONFIG_FILE"
            echo 'CONFIG_LSM="landlock,lockdown,yama,loadpin,safesetid,integrity,selinux,smack,tomoyo,apparmor,bpf,baseband_guard"' >> "$DEFCONFIG_FILE"
          fi
          sed -i '/^config LSM$/,/^help$/{ /^[[:space:]]*default/ { /baseband_guard/! s/selinux/selinux,baseband_guard/ } }' security/Kconfig || true
          
          BBG_C_FILE=$(find . -name "baseband_guard.c" | head -n 1)
          if [ -n "$BBG_C_FILE" ] && grep -q "get_link(dentry, inode, NULL)" "$BBG_C_FILE"; then
            curl -LSs "https://raw.githubusercontent.com/WildKernels/kernel_patches/main/experimental/bbg/bbg_fix_get_link.patch" -o bbg_fix.patch
            patch -p1 --forward < bbg_fix.patch
          fi

      - name: 🔨 Compile Kernel Image
        run: |
          set -euo pipefail
          cd ${KERNEL_ROOT}
          mkdir -p ${OUTDIR}
          
          export PATH="${COMPILER_PATH}:${AOSP_TOOLS_PATH}:$PATH"
          export CC="${COMPILER_CC}"
          export LD=ld.lld
          export CROSS_COMPILE=aarch64-linux-gnu-
          export CROSS_COMPILE_COMPAT=arm-linux-gnueabi-
          export LLVM=1
          export LLVM_IAS=1
          export DTC_FLAGS="-@"
          
          if [ "${{ github.event.inputs.ENABLE_CUSTOM_DEFCONFIG }}" == "true" ] && [ -f "arch/arm64/configs/custom_base_defconfig" ]; then
            CONFIG_ARGS="custom_base_defconfig"
            echo ">>> Overriding default! Using downloaded custom_base_defconfig"
          else
            CONFIG_ARGS="${{ github.event.inputs.DEVICE }}_defconfig"
            echo ">>> Using default device config: $CONFIG_ARGS"
          fi
          
          if [ "${{ github.event.inputs.ENABLE_SU_CONFIG }}" == "true" ] && [ -f "arch/arm64/configs/su.config" ]; then CONFIG_ARGS="$CONFIG_ARGS su.config"; fi
          if [ "${{ github.event.inputs.ENABLE_PERF_CONFIG }}" == "true" ] && [ -f "arch/arm64/configs/perf.config" ]; then CONFIG_ARGS="$CONFIG_ARGS perf.config"; fi
          if [ "${{ github.event.inputs.ENABLE_NETHUNTER_CONFIG }}" == "true" ] && [ -f "arch/arm64/configs/nethunter.config" ]; then CONFIG_ARGS="$CONFIG_ARGS nethunter.config"; fi
          if [ "${{ github.event.inputs.ENABLE_CUSTOM_CONFIG }}" == "true" ] && [ -f "arch/arm64/configs/custom.config" ]; then CONFIG_ARGS="$CONFIG_ARGS custom.config"; fi
          
          echo ">>> Generating Base Config using: make $CONFIG_ARGS"
          make O="${OUTDIR}" CC="${CC}" $CONFIG_ARGS
          
          echo ">>> Compiling Kernel ($(nproc --all) threads)..."
          make -j$(nproc --all) O="${OUTDIR}" CC="${CC}" 2>&1 | tee build.log

      - name: 🧩 Compile & Strip Modules
        run: |
          set -euo pipefail
          cd ${KERNEL_ROOT}
          mkdir -p ${MODULES_OUTDIR}
          export PATH="${COMPILER_PATH}:${AOSP_TOOLS_PATH}:$PATH"
          export CC="${COMPILER_CC}"
          export LD=ld.lld
          export CROSS_COMPILE=aarch64-linux-gnu-
          make -j$(nproc --all) O="${OUTDIR}" CC="${CC}" INSTALL_MOD_STRIP="--strip-debug --keep-section=.ARM.attributes" INSTALL_MOD_PATH="${MODULES_OUTDIR}" modules_install 2>&1 | tee -a build.log || true

      - name: 📦 Package Artifacts
        run: |
          mkdir -p ${GITHUB_WORKSPACE}/artifacts/kernel
          if [ -f ${OUTDIR}/arch/arm64/boot/Image ]; then cp ${OUTDIR}/arch/arm64/boot/Image ${GITHUB_WORKSPACE}/artifacts/kernel/; fi
          if [ -d "${MODULES_OUTDIR}/lib" ]; then tar -C "${MODULES_OUTDIR}" -czf "${GITHUB_WORKSPACE}/artifacts/modules_out.tgz" lib; fi

      - name: ⬆️ Upload Kernel Package
        uses: actions/upload-artifact@v4
        with:
          name: m14-kernel-${{ github.event.inputs.CLANG_VERSION }}-build
          path: ${{ github.workspace }}/artifacts/
          retention-days: 7
