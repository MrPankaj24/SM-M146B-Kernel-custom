name: 🛠️ Dry Run Patch Test (ReSukiSU / M14)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  patch-test:
    name: 🛠️ Test Kernel Patches
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    env:
      KERNEL_REPO_OWNER: MrPankaj24
      KERNEL_REPO_NAME: kernel_common_modifications
      KERNEL_ROOT: ${{ github.workspace }}/kernel_common

    steps:
      - name: Checkout Workflow Repository
        uses: actions/checkout@v4

      - name: Clone Kernel Source & Inject SukiSU
        run: |
          git clone --depth=1 https://github.com/${{ env.KERNEL_REPO_OWNER }}/${{ env.KERNEL_REPO_NAME }}.git kernel_common
          cd kernel_common
          
          rm -rf KernelSU
          echo "Cloning ReSukiSU..."
          git clone https://github.com/ReSukiSU/ReSukiSU.git KernelSU

      - name: Download Patch Files
        run: |
          mkdir -p patches
          cd patches
          wget https://raw.githubusercontent.com/MrPankaj24/SM-M146B-Kernel-custom/main/temp/60_zeromount-android13-5.15.patch
          wget https://raw.githubusercontent.com/MrPankaj24/SM-M146B-Kernel-custom/main/temp/70_ksu_safety-resukisu-5.15.patch
          wget https://raw.githubusercontent.com/MrPankaj24/SM-M146B-Kernel-custom/main/temp/65_zeromount-adb-filter-android13-5.15.patch

      - name: Step 1 - Manual stat.c Fix & Apply 60_zeromount Patch
        run: |
          cd kernel_common
          
          echo "Manually injecting CONFIG_ZEROMOUNT into fs/stat.c..."
          awk '
          /#ifdef CONFIG_KSU_SUSFS/ {
              print "#ifdef CONFIG_ZEROMOUNT"
              print "    /* Try ZeroMount hook for relative paths */"
              print "    if (filename) {"
              print "        int zm_ret = zeromount_stat_hook(dfd, filename, stat, request_mask, flags);"
              print "        if (zm_ret != -ENOENT)"
              print "            return zm_ret;"
              print "    }"
              print "#endif"
              print ""
          }
          {print}' fs/stat.c > fs/stat_tmp.c && mv fs/stat_tmp.c fs/stat.c
          
          echo "Manual injection successful. Now applying the rest of 60_zeromount..."
          patch -p1 < ../patches/60_zeromount-android13-5.15.patch

      - name: Step 2 - Apply 65_zeromount-adb-filter Patch
        run: |
          cd kernel_common
          echo "Applying 65_zeromount-adb-filter patch..."
          # We use -N to forward-apply and || true to prevent crashing if already applied
          patch -p1 -N < ../patches/65_zeromount-adb-filter-android13-5.15.patch || true

      - name: Step 3 - Delete leftover .rej and .orig files
        run: |
          cd kernel_common
          echo "Cleaning up reject and original files..."
          find . -name "*.rej" -type f -delete
          find . -name "*.orig" -type f -delete

      - name: Step 4 - Apply 70_ksu_safety Patch to KernelSU
        run: |
          cd kernel_common/KernelSU
          echo "Applying 70_ksu_safety patch inside KernelSU..."
          patch -p1 < ../../patches/70_ksu_safety-resukisu-5.15.patch

      - name: Generate Verification Diff
        run: |
          cd kernel_common
          git diff > ../patch-results.diff
          
          cd KernelSU
          git diff > ../../kernelsu-patch-results.diff

      - name: Upload Patch Results as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: dry-run-patch-results
          path: |
            patch-results.diff
            kernelsu-patch-results.diff
