name: 🧪 Patch Sequence Test (M14)

on:
  workflow_dispatch:
    inputs:
      KERNEL_SOURCE:
        description: 'Kernel Source URL'
        required: true
        default: 'https://github.com/WildKernels/Samsung_Kernels'
      KERNEL_BRANCH:
        description: 'Kernel Branch'
        required: true
        default: 'SM-M146B-Oneui7-ADYJ2'
      SUSFS_DEVICE_FIXES_PATH:
        description: 'Path to device fix patches'
        required: true
        default: 'samsung/SM-M146B-Oneui7-ADYJ2'

jobs:
  test-patches:
    name: 🧪 Test Patch Sequence
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 🧹 Prepare Workspace
        run: |
          mkdir -p kernel_workspace

      - name: 📥 Clone Kernel Source (Fast/Shallow)
        run: |
          echo ">>> Cloning Kernel..."
          git clone --depth=1 -b ${{ github.event.inputs.KERNEL_BRANCH }} \
            ${{ github.event.inputs.KERNEL_SOURCE }} kernel_workspace

      - name: ⬇️ Download Custom Enginex0 Patches
        run: |
          cd kernel_workspace
          echo ">>> Downloading Enginex0 Patches..."
          curl -LSs "https://raw.githubusercontent.com/Enginex0/Super-Builders/main/android13-5.15/ReSukiSU/patches/50_add_susfs_in_gki-android13-5.15.patch" -o 50_custom.patch
          curl -LSs "https://raw.githubusercontent.com/Enginex0/Super-Builders/main/android13-5.15/ReSukiSU/patches/51_enhanced_susfs-android13-5.15.patch" -o 51_enhanced.patch
          curl -LSs "https://raw.githubusercontent.com/Enginex0/Super-Builders/main/android13-5.15/ReSukiSU/patches/60_zeromount-android13-5.15.patch" -o 60_zeromount.patch

      - name: ⬇️ Fetch Device-Specific Fixes
        run: |
          echo ">>> Fetching WildKernels device fixes..."
          git clone --depth=1 https://github.com/WildKernels/kernel_patches.git custom_patches
          FIX_DIR="custom_patches/${{ github.event.inputs.SUSFS_DEVICE_FIXES_PATH }}"
          
          if [ -d "$FIX_DIR" ]; then
            cp "$FIX_DIR/"*.patch kernel_workspace/ 2>/dev/null || true
            echo "✅ Device fixes loaded."
          else
            echo "⚠️ WARNING: Device fixes path not found!"
          fi

      - name: 🚀 Execute Exact Patch Sequence
        run: |
          cd kernel_workspace
          
          echo "========================================"
          echo "       🚀 FORCING PATCH SEQUENCE        "
          echo "========================================"
          
          # --- 1. Base Custom SUSFS Patch (50) ---
          echo -e "\n---> 1. Applying 50_custom.patch (Rejects expected & ignored)"
          if [ -f "50_custom.patch" ]; then
            patch -p1 --forward < 50_custom.patch || echo "⚠️ 50_custom.patch generated rejects. Proceeding to fixes..."
          else
            echo "❌ Missing 50_custom.patch!" && exit 1
          fi

          # --- 2. Device-Specific Fixes ---
          echo -e "\n---> 2. Applying device-specific fixes to clean up..."
          for p in *.patch; do
            if [[ "$p" != "50_custom.patch" ]] && [[ "$p" != "51_enhanced.patch" ]] && [[ "$p" != "60_zeromount.patch" ]]; then
              echo "  Applying: $p"
              patch -p1 --forward < "$p" || echo "  ⚠️ $p had issues."
            fi
          done

          # --- 3. Enhanced SUSFS Patch (51) ---
          echo -e "\n---> 3. Applying 51_enhanced.patch"
          if [ -f "51_enhanced.patch" ]; then
            patch -p1 --forward < 51_enhanced.patch || echo "⚠️ 51_enhanced.patch had issues."
          fi

          # --- 4. Zeromount Patch (60) ---
          echo -e "\n---> 4. Applying 60_zeromount.patch"
          if [ -f "60_zeromount.patch" ]; then
            patch -p1 --forward < 60_zeromount.patch || echo "⚠️ 60_zeromount.patch had issues."
          fi

          echo -e "\n========================================"
          echo "✅ Sequence complete. Checking for leftover damage..."
          echo "========================================"

      - name: 🔍 Scan & Collect Patch Rejects (.rej)
        if: always()
        run: |
          RDIR="${GITHUB_WORKSPACE}/patch-rejects"
          mkdir -p "$RDIR"
          cd kernel_workspace
          
          # Find all .rej files and map them into an array
          mapfile -t REJS < <(find . -type f -name '*.rej' 2>/dev/null)
          echo "REJ_COUNT=${#REJS[@]}" >> $GITHUB_ENV
          
          if [ ${#REJS[@]} -gt 0 ]; then
            echo "🚨 Found ${#REJS[@]} reject files! Collecting..."
            for R in "${REJS[@]}"; do
              # Keep the folder structure intact so you know exactly which file failed
              mkdir -p "$RDIR/$(dirname "$R")"
              cp "$R" "$RDIR/$R"
              
              # Also grab the original file it failed to patch so you can compare them
              ORIG="${R%.rej}"
              [ -f "$ORIG" ] && cp "$ORIG" "$RDIR/${ORIG}" || true
            done
          else
            echo "🎉 ZERO REJECTS! The patches applied perfectly."
          fi

      - name: ⬆️ Upload Patch Rejects
        if: always() && env.REJ_COUNT != '0'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.DEVICE }}-Leftover-Rejects
          path: ${{ github.workspace }}/patch-rejects/
          retention-days: 5
