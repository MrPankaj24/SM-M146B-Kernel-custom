name: 🧪 Dry-Run Patch Test (M14)

on:
  workflow_dispatch:
    inputs:
      KERNEL_SOURCE:
        description: 'Kernel Source URL'
        required: true
        default: 'https://github.com/WildKernels/Samsung_Kernels'
      KERNEL_BRANCH:
        description: 'Kernel Branch'
        required: true
        default: 'SM-M146B-Oneui7-ADYJ2'
      SUSFS_DEVICE_FIXES_PATH:
        description: 'Path to device fix patches'
        required: true
        default: 'samsung/SM-M146B-Oneui7-ADYJ2'

jobs:
  test-patches:
    name: 🧪 Test Patch Sequence
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 🧹 Prepare Workspace
        run: |
          mkdir -p kernel_workspace

      - name: 📥 Clone Kernel Source (Fast/Shallow)
        run: |
          echo ">>> Cloning Kernel..."
          git clone --depth=1 -b ${{ github.event.inputs.KERNEL_BRANCH }} \
            ${{ github.event.inputs.KERNEL_SOURCE }} kernel_workspace

      - name: ⬇️ Download Custom Patches
        run: |
          cd kernel_workspace
          echo ">>> Downloading Enginex0 Patches..."
          curl -LSs "https://raw.githubusercontent.com/Enginex0/Super-Builders/main/android13-5.15/ReSukiSU/patches/50_add_susfs_in_gki-android13-5.15.patch" -o 50_custom.patch
          curl -LSs "https://raw.githubusercontent.com/Enginex0/Super-Builders/main/android13-5.15/ReSukiSU/patches/51_enhanced_susfs-android13-5.15.patch" -o 51_enhanced.patch
          curl -LSs "https://raw.githubusercontent.com/Enginex0/Super-Builders/main/android13-5.15/ReSukiSU/patches/60_zeromount-android13-5.15.patch" -o 60_zeromount.patch

      - name: ⬇️ Fetch Device-Specific Fixes
        run: |
          echo ">>> Fetching WildKernels device fixes..."
          git clone --depth=1 https://github.com/WildKernels/kernel_patches.git custom_patches
          FIX_DIR="custom_patches/${{ github.event.inputs.SUSFS_DEVICE_FIXES_PATH }}"
          
          if [ -d "$FIX_DIR" ]; then
            cp "$FIX_DIR/"*.patch kernel_workspace/ 2>/dev/null || true
            echo "✅ Device fixes loaded."
          else
            echo "⚠️ WARNING: Device fixes path not found!"
          fi

      - name: 🧪 Execute Dry-Run Sequence
        run: |
          cd kernel_workspace
          
          echo "========================================"
          echo "       🧪 PATCH SEQUENCE TESTER         "
          echo "========================================"
          
          # Function to test dry-run and apply if clean
          test_and_apply() {
            local p_file=$1
            echo -e "\n---> Testing: $p_file"
            
            if patch -p1 --dry-run < "$p_file"; then
              echo "✅ Dry-run clean! Applying silently for sequence continuity..."
              patch -p1 --forward < "$p_file" > /dev/null
            else
              echo "❌ FAILED: $p_file has conflicts or rejects!"
              echo "🚨 Aborting workflow. Fix the patch!"
              exit 1
            fi
          }

          # --- Step 1: Base Custom SUSFS Patch ---
          if [ -f "50_custom.patch" ]; then
            test_and_apply 50_custom.patch
          else
            echo "❌ Missing 50_custom.patch!" && exit 1
          fi

          # --- Step 2: Device-Specific Fixes ---
          echo -e "\n---> Applying device-specific fixes..."
          for p in *.patch; do
            if [[ "$p" != "50_custom.patch" ]] && [[ "$p" != "51_enhanced.patch" ]] && [[ "$p" != "60_zeromount.patch" ]]; then
              test_and_apply "$p"
            fi
          done

          # --- Step 3: Enhanced SUSFS Patch ---
          if [ -f "51_enhanced.patch" ]; then
            test_and_apply 51_enhanced.patch
          fi

          # --- Step 4: Zeromount Patch ---
          if [ -f "60_zeromount.patch" ]; then
            test_and_apply 60_zeromount.patch
          fi

          echo -e "\n========================================"
          echo "🎉 SUCCESS: All patches applied cleanly! "
          echo "========================================"
