name: 🏗️ Build SM-M146B Kernel (WKSU + SUSFS v2.0.0 + BBG)

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:
    inputs:
      build_method:
        description: "Build Method"
        required: true
        type: choice
        options:
          - "Method1-Patch"
          - "Method2-ConfigFragments"
        default: "Method1-Patch"
      ksu_variant:
        description: "KernelSU Variant"
        required: true
        type: choice
        options:
          - Wild_KSU
          - ReSukiSU
          - KernelSU-Next
        default: Wild_KSU
      kernel_name:
        description: "Kernel Name Suffix"
        required: false
        type: string
        default: "-MrPankaj24"
      enable_bbg:
        description: "Enable Baseband Guard (BBG)"
        required: true
        type: boolean
        default: true

jobs:
  build:
    name: "🏗️ SM-M146B | ${{ inputs.build_method }} | ${{ inputs.ksu_variant }}"
    runs-on: ubuntu-22.04
    timeout-minutes: 180

    env:
      ANDROID_VERSION: 15
      KERNEL_VERSION: "5.15"
      DEVICE: m14x
      ANDROID_PLATFORM_VERSION: 15
      DEVICE_PATCHES: SM-M146B-Oneui7-ADYJ2

    steps:
      ########################################
      # 1. SETUP
      ########################################
      - name: Checkout Workflow Repository
        uses: actions/checkout@v4

      - name: Free Disk Space
        uses: endersonmenezes/free-disk-space@v3
        with:
          remove_android: true
          remove_dotnet: true
          remove_haskell: true
          remove_tool_cache: true
          remove_swap: true
          remove_packages: "azure-cli google-cloud-cli microsoft-edge-stable google-chrome-stable firefox postgresql* temurin-* mysql* dotnet-sdk-*"
          remove_packages_one_command: true
          remove_folders: "/usr/share/swift /usr/share/miniconda /usr/share/az* /usr/local/lib/node_modules /usr/local/share/chromium /usr/local/share/powershell /usr/local/julia /usr/local/aws-cli /usr/local/aws-sam-cli /usr/share/gradle"
          rm_cmd: "rmz"
          rmz_version: "3.1.1"
          testing: false

      ########################################
      # 2. INSTALL DEPENDENCIES
      ########################################
      - name: 📦 Install Build Dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            git curl wget \
            bc bison flex \
            libssl-dev libelf-dev \
            python3 python-is-python3 \
            make gcc gcc-aarch64-linux-gnu \
            binutils binutils-aarch64-linux-gnu \
            g++ cpio zip unzip \
            lz4 zstd xz-utils \
            libncurses-dev libncurses5-dev \
            kmod rsync \
            lld llvm clang \
            dwarves pahole \
            ccache \
            device-tree-compiler \
            zlib1g-dev libc6-dev-i386 \
            cmake ninja-build \
            libyaml-dev file

      ########################################
      # 3. TOOLCHAIN (AOSP Clang r450784d)
      ########################################
      - name: 🔧 Cache Toolchains
        id: cache-toolchain
        uses: actions/cache@v4
        with:
          path: |
            toolchain/clang/host/linux-x86/clang-r450784d
            toolchain/build/kernel/build-tools
            toolchain/prebuilts/kernel-build-tools
          key: toolchain-clang-r450784d-kernel-build-tools-v3

      - name: ⬇️ Download Clang r450784d
        if: steps.cache-toolchain.outputs.cache-hit != 'true'
        run: |
          mkdir -p toolchain/clang/host/linux-x86/clang-r450784d
          echo "📦 Downloading Clang r450784d from AOSP..."
          curl -L \
            "https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/android13-release/clang-r450784d.tar.gz" \
            -o /tmp/clang.tar.gz
          tar -xzf /tmp/clang.tar.gz -C toolchain/clang/host/linux-x86/clang-r450784d
          rm /tmp/clang.tar.gz
          toolchain/clang/host/linux-x86/clang-r450784d/bin/clang --version

      - name: ⬇️ Download Kernel Build Tools
        if: steps.cache-toolchain.outputs.cache-hit != 'true'
        run: |
          git clone --depth=1 -b main \
            https://android.googlesource.com/kernel/prebuilts/build-tools \
            toolchain/build/kernel/build-tools

      - name: ⬇️ Download Kernel Prebuilt Tools
        if: steps.cache-toolchain.outputs.cache-hit != 'true'
        run: |
          git clone --depth=1 \
            https://android.googlesource.com/kernel/prebuilts/build-tools \
            toolchain/prebuilts/kernel-build-tools

      - name: 🔍 Verify Toolchain
        run: |
          echo "=== AOSP Clang ==="
          toolchain/clang/host/linux-x86/clang-r450784d/bin/clang --version
          echo "=== Cross GCC ==="
          aarch64-linux-gnu-gcc --version
          echo "=== pahole ==="
          pahole --version

      - name: Setup Toolchain Environment
        run: |
          CLANG_DIR="$(pwd)/toolchain/clang/host/linux-x86/clang-r450784d/bin"
          BUILD_TOOLS_DIR="$(pwd)/toolchain/build/kernel/build-tools/linux-x86/bin"
          PREBUILT_DIR="$(pwd)/toolchain/prebuilts/kernel-build-tools/linux-x86/bin"

          echo "CLANG_DIR=$CLANG_DIR" >> $GITHUB_ENV
          echo "BUILD_TOOLS_DIR=$BUILD_TOOLS_DIR" >> $GITHUB_ENV
          echo "PREBUILT_DIR=$PREBUILT_DIR" >> $GITHUB_ENV

          echo "$CLANG_DIR" >> $GITHUB_PATH
          echo "$BUILD_TOOLS_DIR" >> $GITHUB_PATH
          [ -d "$PREBUILT_DIR" ] && echo "$PREBUILT_DIR" >> $GITHUB_PATH

      ########################################
      # 4. CLONE SOURCES
      ########################################
      - name: Clone Kernel Source
        run: |
          git clone --depth 1 https://github.com/MrPankaj24/SM-M146B-Kernel-Source.git kernel_source

      - name: Clone AnyKernel3
        run: |
          git clone https://github.com/WildKernels/AnyKernel3.git -b gki-2.0

      - name: Clone Build Dependencies (Method 1)
        if: inputs.build_method == 'Method1-Patch'
        run: |
          git clone https://github.com/WildKernels/kernel_patches.git
          git clone https://gitlab.com/simonpunk/susfs4ksu.git -b "gki-${{ env.ANDROID_VERSION }}-${{ env.KERNEL_VERSION }}"

      ########################################
      # 5. SET ENVIRONMENT VARIABLES
      ########################################
      - name: Set Environment Variables
        run: |
          ROOT="$GITHUB_WORKSPACE"
          KERNEL_SRC="$ROOT/kernel_source"

          echo "KERNEL_SRC=$KERNEL_SRC" >> $GITHUB_ENV
          echo "DEFCONFIG=$KERNEL_SRC/arch/arm64/configs/s5e8535-m14xnsxx_defconfig" >> $GITHUB_ENV
          echo "ANYKERNEL3=$ROOT/AnyKernel3" >> $GITHUB_ENV
          echo "SUSFS4KSU=$ROOT/susfs4ksu" >> $GITHUB_ENV
          echo "KERNEL_PATCHES=$ROOT/kernel_patches" >> $GITHUB_ENV

      - name: Extract Compressed Archives
        run: |
          cd "$KERNEL_SRC"
          find . -type f -name '*.tar.xz' -print0 | while IFS= read -r -d '' file; do
            echo "📂 Extracting $file..."
            tar -xf "$file"
            rm "$file"
          done

      - name: 🔍 Inspect Original build_kernel.sh (Debug)
        run: |
          cd "$KERNEL_SRC"
          echo "=== PLATFORM_VERSION / ANDROID references ==="
          grep -n -i "PLATFORM_VERSION\|ANDROID_MAJOR_VERSION\|ANDROID_VERSION\|SCSC_SEP\|ANDROID_PLATFORM" build_kernel.sh || true
          echo ""
          echo "=== CC / Clang references ==="
          grep -n -i "clang\|CC=\|HOSTCC\|CROSS_COMPILE" build_kernel.sh || true
          echo ""
          echo "=== Defconfig references ==="
          grep -n -i "defconfig\|DEFCONFIG" build_kernel.sh || true

      ########################################
      # 6. ADD KERNELSU
      ########################################
      - name: Add KernelSU (${{ inputs.ksu_variant }})
        run: |
          cd "$KERNEL_SRC"
          if [ "${{ inputs.ksu_variant }}" == "Wild_KSU" ]; then
            curl -LSs "https://raw.githubusercontent.com/WildKernels/Wild_KSU/wild/kernel/setup.sh" | bash -s canary
          elif [ "${{ inputs.ksu_variant }}" == "ReSukiSU" ]; then
            rm -rf KernelSU
            git clone https://github.com/ReSukiSU/ReSukiSU.git KernelSU
          elif [ "${{ inputs.ksu_variant }}" == "KernelSU-Next" ]; then
            curl -LSs "https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/next/kernel/setup.sh" | bash -s stable
          fi

      - name: Get KernelSU Version Info
        run: |
          cd "$KERNEL_SRC"
          if [ -d "Wild_KSU/kernel" ]; then
            KSU_DIR="Wild_KSU/kernel"
          elif [ -d "KernelSU/kernel" ]; then
            KSU_DIR="KernelSU/kernel"
          else
            echo "KSU_VERSION=unknown" >> $GITHUB_ENV
            echo "KSU_VERSION_TAG=unknown" >> $GITHUB_ENV
            exit 0
          fi

          cd "$KSU_DIR"
          if [ -d ".git" ]; then
            [ -f ".git/shallow" ] && git fetch --unshallow || true
            KSU_GIT_VERSION=$(git rev-list --count HEAD)
            KSU_VERSION=$((30000 + KSU_GIT_VERSION))
            KSU_GIT_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.1")
          else
            KSU_VERSION=33208
            KSU_GIT_TAG="v3.1.2"
          fi

          echo "KSU_VERSION=$KSU_VERSION" >> $GITHUB_ENV
          echo "KSU_VERSION_TAG=$KSU_GIT_TAG" >> $GITHUB_ENV

          [ -f "Kbuild" ] && {
            sed -i "s/KSU_VERSION_FALLBACK := [0-9]\+/KSU_VERSION_FALLBACK := ${KSU_VERSION}/" Kbuild
            sed -i "s/KSU_VERSION_TAG_FALLBACK := .*/KSU_VERSION_TAG_FALLBACK := ${KSU_GIT_TAG}/" Kbuild
          }

      ########################################
      #   METHOD 1: WILDKERNELS PATCH APPROACH
      ########################################
      - name: "[M1] Apply SUSFS v2.0.0 Patches"
        if: inputs.build_method == 'Method1-Patch'
        run: |
          cd "$KERNEL_SRC"
          cp "$SUSFS4KSU/kernel_patches/fs/"* ./fs/
          cp "$SUSFS4KSU/kernel_patches/include/linux/"* ./include/linux/
          cp "$SUSFS4KSU/kernel_patches/50_add_susfs_in_gki-${{ env.ANDROID_VERSION }}-${{ env.KERNEL_VERSION }}.patch" ./
          patch -p1 < "50_add_susfs_in_gki-${{ env.ANDROID_VERSION }}-${{ env.KERNEL_VERSION }}.patch" || true
          rm -f "50_add_susfs_in_gki-${{ env.ANDROID_VERSION }}-${{ env.KERNEL_VERSION }}.patch"

      - name: "[M1] Apply Device-Specific Patches"
        if: inputs.build_method == 'Method1-Patch'
        run: |
          cd "$KERNEL_SRC"
          PATCH_DIR="$KERNEL_PATCHES/samsung/${{ env.DEVICE_PATCHES }}"
          if [ -d "$PATCH_DIR" ] && ls "$PATCH_DIR"/*.patch &>/dev/null; then
            cp "$PATCH_DIR/"* ./
            for p in *.patch; do
              [ -f "$p" ] || continue
              echo "  → $p"
              patch -p1 < "$p" || true
            done
          fi

      - name: "[M1] Add BBG"
        if: inputs.build_method == 'Method1-Patch' && inputs.enable_bbg
        run: |
          cd "$KERNEL_SRC"
          curl -LSs https://github.com/vc-teahouse/Baseband-guard/raw/main/setup.sh | bash
          echo "CONFIG_BBG=y" >> "$DEFCONFIG"
          sed -i '/^config LSM$/,/^help$/{ /^[[:space:]]*default/ { /baseband_guard/! s/selinux/selinux,baseband_guard/ } }' security/Kconfig
          if [ -f "./Baseband-guard/baseband_guard.c" ]; then
            if grep -qxF $'\t\tconst char* symlink_target_link = inode->i_op->get_link(dentry, inode, NULL);' ./Baseband-guard/baseband_guard.c; then
              patch -p1 --forward < "$KERNEL_PATCHES/experimental/bbg/bbg_fix_get_link.patch" || true
            fi
          fi

      - name: "[M1] Append Kernel Defconfig"
        if: inputs.build_method == 'Method1-Patch'
        run: |
          cat >> "$DEFCONFIG" << 'EOF'
          CONFIG_KSU=y
          CONFIG_KSU_SUSFS=y
          CONFIG_TMPFS_XATTR=y
          CONFIG_TMPFS_POSIX_ACL=y
          CONFIG_LOG_BUF_SHIFT=20
          CONFIG_UH=n
          CONFIG_UH_RKP=n
          CONFIG_UH_LKMAUTH=n
          CONFIG_UH_LKM_BLOCK=n
          CONFIG_RKP_CFP_JOPP=n
          CONFIG_RKP_CFP=n
          CONFIG_SECURITY_DEFEX=n
          CONFIG_PROCA=n
          CONFIG_FIVE=n
          CONFIG_RKP=n
          CONFIG_KDP_NS=n
          CONFIG_KDP=n
          CONFIG_MODULES=y
          CONFIG_MODULE_FORCE_LOAD=y
          CONFIG_MODULE_UNLOAD=y
          CONFIG_MODULE_FORCE_UNLOAD=y
          CONFIG_MODVERSIONS=y
          CONFIG_MODULE_SRCVERSION_ALL=n
          CONFIG_MODULE_SIG=n
          CONFIG_MODULE_COMPRESS=n
          CONFIG_TRIM_UNUSED_KSYMS=n
          EOF

      ########################################
      #   METHOD 2: CONFIG FRAGMENTS APPROACH
      ########################################
      - name: "[M2] Create Config Fragments"
        if: inputs.build_method == 'Method2-ConfigFragments'
        run: |
          cd "$KERNEL_SRC"
          CONFIGS_DIR="arch/arm64/configs"

          cat > "$CONFIGS_DIR/su.config" << 'EOF'
          CONFIG_KSU=y
          CONFIG_KALLSYMS_ALL=y
          CONFIG_KSU_SUSFS=y
          CONFIG_KSU_SUSFS_SUS_OVERLAYFS=y
          CONFIG_KSU_SUSFS_SUS_MAP=y
          CONFIG_KSU_SUSFS_SUS_PATH=y
          CONFIG_KSU_SUSFS_SUS_MOUNT=y
          CONFIG_KSU_SUSFS_SUS_KSTAT=y
          CONFIG_KSU_SUSFS_AUTO_ADD_SUS_KSU_DEFAULT_MOUNT=y
          CONFIG_KSU_SUSFS_AUTO_ADD_SUS_BIND_MOUNT=y
          CONFIG_KSU_SUSFS_TRY_UMOUNT=y
          CONFIG_KSU_SUSFS_AUTO_ADD_TRY_UMOUNT_FOR_BIND_MOUNT=y
          CONFIG_KSU_SUSFS_SPOOF_UNAME=y
          CONFIG_KSU_SUSFS_ENABLE_LOG=y
          CONFIG_KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS=y
          CONFIG_KSU_SUSFS_SPOOF_CMDLINE_OR_BOOTCONFIG=y
          CONFIG_KSU_SUSFS_OPEN_REDIRECT=y
          EOF

          SUFFIX="${{ inputs.kernel_name }}"
          cat > "$CONFIGS_DIR/custom.config" << EOF
          CONFIG_LOCALVERSION="${SUFFIX}"
          CONFIG_TMPFS_XATTR=y
          CONFIG_TMPFS_POSIX_ACL=y
          CONFIG_LOG_BUF_SHIFT=20
          CONFIG_UH=n
          CONFIG_UH_RKP=n
          CONFIG_UH_LKMAUTH=n
          CONFIG_UH_LKM_BLOCK=n
          CONFIG_RKP_CFP_JOPP=n
          CONFIG_RKP_CFP=n
          CONFIG_SECURITY_DEFEX=n
          CONFIG_PROCA=n
          CONFIG_FIVE=n
          CONFIG_RKP=n
          CONFIG_KDP_NS=n
          CONFIG_KDP=n
          CONFIG_MODULES=y
          CONFIG_MODULE_FORCE_LOAD=y
          CONFIG_MODULE_UNLOAD=y
          CONFIG_MODULE_FORCE_UNLOAD=y
          CONFIG_MODVERSIONS=y
          CONFIG_MODULE_SRCVERSION_ALL=n
          CONFIG_MODULE_SIG=n
          CONFIG_MODULE_COMPRESS=n
          CONFIG_TRIM_UNUSED_KSYMS=n
          EOF

          [ ! -f "$CONFIGS_DIR/perf.config" ] && echo "# perf placeholder" > "$CONFIGS_DIR/perf.config"
          echo "✅ Config fragments created in $CONFIGS_DIR"

      - name: "[M2] Apply Module Version Bypass & SPI CRC Disable"
        if: inputs.build_method == 'Method2-ConfigFragments'
        run: |
          cd "$KERNEL_SRC"
          if [ -f "kernel/module.c" ]; then
            sed -i '/bad_version:/,/return 0;/{s/return 0;/return 1;/}' kernel/module.c
            echo "✅ Module version bypass applied"
          fi
          if [ -f "drivers/mmc/core/core.c" ]; then
            sed -i 's/bool use_spi_crc = 1;/bool use_spi_crc = 0;/' drivers/mmc/core/core.c
            echo "✅ SPI CRC disabled"
          fi

      - name: "[M2] Add BBG"
        if: inputs.build_method == 'Method2-ConfigFragments' && inputs.enable_bbg
        run: |
          cd "$KERNEL_SRC"
          curl -LSs https://github.com/vc-teahouse/Baseband-guard/raw/main/setup.sh | bash
          echo "CONFIG_BBG=y" >> "$DEFCONFIG"
          sed -i 's/CONFIG_LSM="landlock,lockdown,yama,loadpin,safesetid,integrity,selinux,smack,tomoyo,apparmor,bpf"/CONFIG_LSM="landlock,lockdown,yama,loadpin,safesetid,integrity,selinux,smack,tomoyo,apparmor,bpf,baseband_guard"/' "$DEFCONFIG"
          sed -i '/^config LSM$/,/^help$/{ /^[[:space:]]*default/ { /baseband_guard/! s/selinux/selinux,baseband_guard/ } }' security/Kconfig

      ########################################
      # 7. CUSTOMIZE KERNEL
      ########################################
      - name: Customize Kernel Identity
        run: |
          cd "$KERNEL_SRC"
          if [ "${{ inputs.build_method }}" == "Method1-Patch" ]; then
            SUFFIX="${{ inputs.kernel_name }}"
            [ -n "$SUFFIX" ] && sed -i '$s|echo "\$res"|echo "\$res'"$SUFFIX"'"|' ./scripts/setlocalversion 2>/dev/null || true
            TIMESTAMP=$(date -u '+%a %b %d %H:%M:%S UTC %Y')
            perl -pi -e 's{UTS_VERSION="\$\(echo \$UTS_VERSION \$CONFIG_FLAGS \$TIMESTAMP \| cut -b -\$UTS_LEN\)"}{UTS_VERSION="#1 SMP PREEMPT '"$TIMESTAMP"'"}' \
              ./scripts/mkcompile_h 2>/dev/null || true
          fi
          sed -i 's/-dirty//' ./scripts/setlocalversion

      ########################################
      # 8. CREATE & RUN BUILD SCRIPT
      ########################################
      - name: 🏗️ Create Build Script
        run: |
          cd "$KERNEL_SRC"

          if [ "${{ inputs.build_method }}" == "Method1-Patch" ]; then
            DEFCONFIG_CMD="s5e8535-m14xnsxx_defconfig"
          else
            DEFCONFIG_CMD="s5e8535-m14xnsxx_defconfig"
            for cfg in su.config custom.config perf.config; do
              [ -f "arch/arm64/configs/$cfg" ] && DEFCONFIG_CMD="$DEFCONFIG_CMD $cfg"
            done
          fi

          echo "📋 Defconfig: $DEFCONFIG_CMD"

          cat > build_ci.sh << 'BUILDEOF'
#!/usr/bin/env bash
set -e

export ABI_DEFINITION=
export KMI_SYMBOL_LIST_STRICT_MODE=0
export SKIP_ABI_CHECKS=1
export KMI_ENFORCE=0

# All variables passed on make command line = HIGHEST PRIORITY
MAKE_ARGS=(
    -j$(nproc --all)
    O=out
    ARCH=arm64
    SUBARCH=arm64
    CC=clang
    HOSTCC=clang
    CROSS_COMPILE=aarch64-linux-gnu-
    CLANG_TRIPLE=aarch64-linux-gnu-
    LLVM=1
    LLVM_IAS=1
    LTO=thin
    TARGET_SOC=s5e8535
    SOC_NAME=s5e8535
    DTC_FLAGS="-@"
    DEPMOD=depmod
    PLATFORM_VERSION=15
    ANDROID_MAJOR_VERSION=t
)

echo "============================================"
echo "🏗️  SM-M146B Kernel Build"
echo "    CC:    $(which clang)"
echo "    Clang: $(clang --version | head -1)"
echo "    Args:  ${MAKE_ARGS[*]}"
echo "============================================"

rm -rf out modules_out

echo "📋 Step A: Config..."
make "${MAKE_ARGS[@]}" __DEFCONFIG_PLACEHOLDER__

echo "📋 Step B: Prepare..."
make -j4 O=out ARCH=arm64 PLATFORM_VERSION=15 ANDROID_MAJOR_VERSION=t prepare

echo "📋 Step C: Compile..."
make "${MAKE_ARGS[@]}"

echo "📋 Step D: Modules..."
mkdir -p modules_out
make "${MAKE_ARGS[@]}" \
    INSTALL_MOD_STRIP="--strip-debug --keep-section=.ARM.attributes" \
    INSTALL_MOD_PATH="$(pwd)/modules_out" \
    modules_install || true

if [ -f "out/arch/arm64/boot/Image" ]; then
    echo "✅ BUILD SUCCESSFUL! ($(ls -lh out/arch/arm64/boot/Image | awk '{print $5}'))"
else
    echo "❌ BUILD FAILED!"
    exit 1
fi
BUILDEOF

          # Insert actual defconfig command
          sed -i "s|__DEFCONFIG_PLACEHOLDER__|${DEFCONFIG_CMD}|" build_ci.sh

          chmod +x build_ci.sh
          echo "=== build_ci.sh ==="
          cat build_ci.sh

      - name: 🏗️ Execute Build
        run: |
          cd "$KERNEL_SRC"
          export PATH="${CLANG_DIR}:${BUILD_TOOLS_DIR}:${PREBUILT_DIR}:$PATH"
          ./build_ci.sh 2>&1 | tee build_full.log

      ########################################
      # 9. PACKAGE
      ########################################
      - name: 📦 Prepare AnyKernel3 Package
        run: |
          cd "$KERNEL_SRC"
          IMAGE_PATH=""
          for path in "./out/arch/arm64/boot/Image" "./arch/arm64/boot/Image"; do
            [ -f "$path" ] && IMAGE_PATH="$path" && break
          done
          if [ -z "$IMAGE_PATH" ]; then
            echo "❌ Kernel Image not found!"
            find . -name "Image" -type f 2>/dev/null || true
            exit 1
          fi
          cp "$IMAGE_PATH" "$ANYKERNEL3/Image"
          echo "✅ Image → AnyKernel3 ($(ls -lh "$ANYKERNEL3/Image" | awk '{print $5}'))"

      ########################################
      # 10. UPLOAD
      ########################################
      - name: 📤 Upload AnyKernel3
        uses: actions/upload-artifact@v4
        with:
          name: "SM-M146B-${{ env.KERNEL_VERSION }}-${{ env.ANDROID_VERSION }}-${{ inputs.ksu_variant }}-${{ inputs.build_method }}-AnyKernel3"
          path: ./AnyKernel3/**
          compression-level: 9

      - name: 📤 Upload Kernel Image
        uses: actions/upload-artifact@v4
        with:
          name: SM-M146B-Kernel-Image
          path: ./kernel_source/out/arch/arm64/boot/Image
          if-no-files-found: warn

      - name: 📤 Upload Build Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: SM-M146B-Build-Logs
          path: ./kernel_source/build_full.log
          if-no-files-found: ignore

      ########################################
      # 11. DIAGNOSTICS
      ########################################
      - name: 🔍 Collect Patch Rejects
        if: always()
        run: |
          REJECTS_DIR="$GITHUB_WORKSPACE/patch-rejects"
          mkdir -p "$REJECTS_DIR"
          mapfile -t REJS < <(find "$KERNEL_SRC" -type f -name '*.rej' 2>/dev/null)
          echo "Found ${#REJS[@]} .rej files"
          for REJ in "${REJS[@]}"; do
            REL="${REJ#"$KERNEL_SRC"/}"
            DEST="$REJECTS_DIR/$REL"
            mkdir -p "$(dirname "$DEST")"
            cp "$REJ" "$DEST"
            ORIG="${REJ%.rej}"
            [ -f "$ORIG" ] && cp "$ORIG" "$REJECTS_DIR/${REL%.rej}"
            echo "$REL" >> "$REJECTS_DIR/index.txt"
          done

      - name: 📤 Upload Patch Rejects
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: SM-M146B-Patch-Rejects
          path: ./patch-rejects/**
          if-no-files-found: ignore

      - name: 📊 Build Summary
        if: always()
        run: |
          echo "## 🏗️ SM-M146B Kernel Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Setting | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Build Method** | ${{ inputs.build_method }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Device** | SM-M146B (Exynos 8535 / Galaxy M14) |" >> $GITHUB_STEP_SUMMARY
          echo "| **Kernel** | ${{ env.KERNEL_VERSION }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Android** | ${{ env.ANDROID_VERSION }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **KernelSU** | ${{ inputs.ksu_variant }} (${{ env.KSU_VERSION }} / ${{ env.KSU_VERSION_TAG }}) |" >> $GITHUB_STEP_SUMMARY
          echo "| **SUSFS** | v2.0.0 |" >> $GITHUB_STEP_SUMMARY
          echo "| **BBG** | ${{ inputs.enable_bbg }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Toolchain** | AOSP Clang r450784d |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f "${{ env.ANYKERNEL3 }}/Image" ]; then
            SIZE=$(ls -lh "${{ env.ANYKERNEL3 }}/Image" | awk '{print $5}')
            echo "### ✅ Build Successful — Image: $SIZE" >> $GITHUB_STEP_SUMMARY
          else
            echo "### ❌ Build Failed" >> $GITHUB_STEP_SUMMARY
          fi
          REJ_FILE="${{ github.workspace }}/patch-rejects/index.txt"
          if [ -f "$REJ_FILE" ] && [ -s "$REJ_FILE" ]; then
            echo "### ⚠️ Patch Rejects" >> $GITHUB_STEP_SUMMARY
            while IFS= read -r line; do
              echo "- \`$line\`" >> $GITHUB_STEP_SUMMARY
            done < "$REJ_FILE"
          fi
