name: 🏗️ Build SM-M146B Kernel (s5e8535)

on:
  workflow_dispatch:
    inputs:
      kpm:
        description: "Enable KPM (disable RWX protections)"
        required: true
        type: choice
        options:
          - "1"
          - "0"
        default: "1"

permissions:
  contents: read

jobs:
  build:
    name: 🏗️ wksu SM-M146B | Exynos 1330 | Android 15 | 5.15
    runs-on: ubuntu-24.04
    timeout-minutes: 120

    env:
      BRANCH: SM-M146B-Oneui7-ADYJ2
      KERNEL_DIR: ${{ github.workspace }}/kernel_source
      DEFCONFIG: s5e8535-m14xnsxx_defconfig

    steps:
      # ==========================================
      # Free Disk Space
      # ==========================================
      - name: Free Disk Space
        uses: endersonmenezes/free-disk-space@v3
        with:
          remove_android: true
          remove_dotnet: true
          remove_haskell: true
          remove_tool_cache: true
          remove_swap: true
          remove_packages: "azure-cli google-cloud-cli microsoft-edge-stable google-chrome-stable firefox postgresql* temurin-* *llvm* mysql* dotnet-sdk-*"
          remove_packages_one_command: true
          remove_folders: "/usr/share/swift /usr/share/miniconda /usr/share/az* /usr/local/lib/node_modules /usr/local/share/chromium /usr/local/share/powershell /usr/local/julia /usr/local/aws-cli /usr/local/aws-sam-cli /usr/share/gradle"
          rm_cmd: "rmz"
          rmz_version: "3.1.1"
          testing: false

      # ==========================================
      # Install Minimal Dependencies
      # ==========================================
      - name: Install Build Dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y --no-install-recommends \
            build-essential bc flex bison libssl-dev libelf-dev \
            python3 python-is-python3 git curl cpio \
            libyaml-dev libncurses-dev dwarves \
            device-tree-compiler file zip

      # ==========================================
      # Clone Kernel Source
      # ==========================================
      - name: Clone Kernel Source
        run: |
          echo ">>> Cloning branch: ${{ env.BRANCH }}"
          git clone --depth 1 -b ${{ env.BRANCH }} --single-branch \
            https://github.com/WildKernels/Samsung_Kernels.git \
            ${{ env.KERNEL_DIR }}

      # ==========================================
      # Extract Bundled Toolchain
      # ==========================================
      - name: Extract Toolchain Archives (tar.xz)
        run: |
          cd ${{ env.KERNEL_DIR }}
          echo ">>> Extracting bundled toolchain archives..."
          find . -type f -name '*.tar.xz' -print0 | while IFS= read -r -d '' file; do
            echo "  Extracting: $file"
            tar -xf "$file"
            rm "$file"
          done
          echo "✅ All archives extracted"

          # Verify toolchain exists
          if [ -d "toolchain/clang/host/linux-x86/clang-r450784d/bin" ]; then
            echo "✅ Clang r450784d found"
            ./toolchain/clang/host/linux-x86/clang-r450784d/bin/clang --version || true
          else
            echo "❌ Toolchain not found!"
            find . -path "*/clang*" -name "clang" -type f 2>/dev/null | head -5
            exit 1
          fi

      # ==========================================
      # Fix build_kernel.sh (add -j flag)
      # ==========================================
      - name: Patch build_kernel.sh for parallel build
        run: |
          cd ${{ env.KERNEL_DIR }}

          # Add -j$(nproc) to the final make command so it doesn't build single-threaded
          # The last 'make' in the script has no -j flag — fix it
          sed -i 's/^make$/make -j$(nproc)/' build_kernel.sh

          echo ">>> Patched build_kernel.sh:"
          cat build_kernel.sh
          echo ""

      # ==========================================
      # Build Kernel
      # ==========================================
      - name: Build Kernel
        run: |
          cd ${{ env.KERNEL_DIR }}

          echo ""
          echo "============================================"
          echo "  Device:    SM-M146B (Galaxy M14 5G)"
          echo "  SoC:       Exynos 1330 (s5e8535)"
          echo "  Defconfig: ${{ env.DEFCONFIG }}"
          echo "  KPM:       ${{ inputs.kpm }}"
          echo "  Toolchain: clang-r450784d (bundled)"
          echo "============================================"
          echo ""

          chmod +x build_kernel.sh
          KPM=${{ inputs.kpm }} ./build_kernel.sh 2>&1 | tee build.log

      # ==========================================
      # Verify Output
      # ==========================================
      - name: Verify Build Output
        run: |
          IMAGE="${{ env.KERNEL_DIR }}/arch/arm64/boot/Image"

          if [ -f "$IMAGE" ]; then
            SIZE=$(stat -c%s "$IMAGE")
            echo ""
            echo "============================================"
            echo "  ✅ BUILD SUCCESSFUL"
            echo "  Image: $IMAGE"
            echo "  Size:  $((SIZE / 1024 / 1024)) MB ($SIZE bytes)"
            echo "============================================"
          else
            echo ""
            echo "============================================"
            echo "  ❌ BUILD FAILED — Image not found"
            echo "============================================"
            echo ""
            echo "Searching for any Image files:"
            find ${{ env.KERNEL_DIR }} -name "Image*" -type f 2>/dev/null || echo "  None found"
            echo ""
            echo "=== Last 50 lines of build.log ==="
            tail -50 ${{ env.KERNEL_DIR }}/build.log || true
            exit 1
          fi

      # ==========================================
      # Collect Artifacts
      # ==========================================
      - name: Prepare Artifacts
        run: |
          mkdir -p ${{ github.workspace }}/artifacts

          # Copy kernel Image
          cp ${{ env.KERNEL_DIR }}/arch/arm64/boot/Image \
             ${{ github.workspace }}/artifacts/Image

          # Copy build log
          cp ${{ env.KERNEL_DIR }}/build.log \
             ${{ github.workspace }}/artifacts/build.log || true

          # Copy .config for reference
          cp ${{ env.KERNEL_DIR }}/.config \
             ${{ github.workspace }}/artifacts/kernel.config || true

          # List DTBs if any
          find ${{ env.KERNEL_DIR }}/arch/arm64/boot -name "*.dtb" -type f \
            -exec cp {} ${{ github.workspace }}/artifacts/ \; 2>/dev/null || true

          echo ">>> Artifacts ready:"
          ls -lh ${{ github.workspace }}/artifacts/

      # ==========================================
      # Upload Artifacts
      # ==========================================
      - name: Upload Kernel Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: SM-M146B-kernel-Image
          path: ${{ github.workspace }}/artifacts/*
          compression-level: 9

      # ==========================================
      # Build Summary
      # ==========================================
      - name: Build Summary
        if: always()
        run: |
          IMAGE="${{ env.KERNEL_DIR }}/arch/arm64/boot/Image"

          echo "## 🏗️ SM-M146B Kernel Build" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Device** | SM-M146B (Galaxy M14 5G) |" >> $GITHUB_STEP_SUMMARY
          echo "| **SoC** | Exynos 1330 (s5e8535) |" >> $GITHUB_STEP_SUMMARY
          echo "| **Branch** | \`${{ env.BRANCH }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Defconfig** | \`${{ env.DEFCONFIG }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Toolchain** | clang-r450784d (bundled) |" >> $GITHUB_STEP_SUMMARY
          echo "| **KPM** | ${{ inputs.kpm }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Android** | 13 (Tiramisu) |" >> $GITHUB_STEP_SUMMARY
          echo "| **Kernel** | 5.15 |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ -f "$IMAGE" ]; then
            SIZE=$(stat -c%s "$IMAGE")
            echo "### ✅ Result: SUCCESS" >> $GITHUB_STEP_SUMMARY
            echo "- Image size: **$((SIZE / 1024 / 1024)) MB**" >> $GITHUB_STEP_SUMMARY
          else
            echo "### ❌ Result: FAILED" >> $GITHUB_STEP_SUMMARY
            echo "Kernel Image was not produced." >> $GITHUB_STEP_SUMMARY
          fi
