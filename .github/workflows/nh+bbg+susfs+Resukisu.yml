name: Build Samsung M14 5G Kernel (ReSukiSU + SUSFS + BBG)

on:
  workflow_dispatch:
    inputs:
      KERNEL_SOURCE:
        description: 'Kernel Source URL'
        required: true
        default: 'https://github.com/Pankaj-1234/android_kernel_samsung_m14x'
      USE_SPECIFIC_BRANCH:
        description: 'Clone a specific kernel branch? (Uncheck to use default)'
        type: boolean
        default: true
      KERNEL_BRANCH:
        description: 'Kernel Branch Name (if checked above)'
        required: false
        default: 'android13-5.15'
      BBG_BRANCH:
        description: 'Baseband Guard (BBG) Branch'
        required: true
        default: 'main'
      DEVICE:
        description: 'Device Codename'
        required: true
        default: 'm14x'

jobs:
  build:
    runs-on: ubuntu-22.04
    
    env:
      KERNEL_ROOT: ${{ github.workspace }}/kernel_workspace
      
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential bc curl git zip unzip \
          libssl-dev libelf-dev clang lld python3 flex bison \
          software-properties-common wget cpio

      - name: Clone Kernel Source
        run: |
          if [ "${{ github.event.inputs.USE_SPECIFIC_BRANCH }}" == "true" ]; then
            echo "Cloning specific branch: ${{ github.event.inputs.KERNEL_BRANCH }}"
            git clone --depth=1 -b ${{ github.event.inputs.KERNEL_BRANCH }} ${{ github.event.inputs.KERNEL_SOURCE }} ${KERNEL_ROOT}
          else
            echo "Cloning default branch..."
            git clone --depth=1 ${{ github.event.inputs.KERNEL_SOURCE }} ${KERNEL_ROOT}
          fi

      - name: Setup AOSP Clang Toolchain
        run: |
          cd ${KERNEL_ROOT}
          mkdir clang
          wget -q https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/main/clang-r487747c.tar.gz -O clang.tar.gz
          tar -xf clang.tar.gz -C clang/
          rm clang.tar.gz
          echo "Clang downloaded and extracted."

      - name: Setup ReSukiSU & SUSFS
        run: |
          cd ${KERNEL_ROOT}
          # Setup KernelSU/ReSukiSU
          curl -ls https://raw.githubusercontent.com/rsuntk/KernelSU/main/kernel/setup.sh | bash -
          
          # Setup SUSFS (Assuming you have a script or patch to apply here)
          # git clone https://gitlab.com/simonpunk/susfs4ksu.git -b gki-android13-5.15
          # cp -r susfs4ksu/kernel_patches/* ./
          # patch -p1 < 50_add_susfs_in_gki-android13-5.15.patch

      - name: Enable SUSFS Features (su.config)
        run: |
          set -euo pipefail
          cd ${KERNEL_ROOT}
          
          echo "Finding su.config to enable SUSFS features..."
          CONFIG_FILE=$(find . -name "su.config" | head -n 1)
          
          if [ -n "$CONFIG_FILE" ]; then
            echo "su.config found at $CONFIG_FILE. Applying SUSFS configs..."
            cat >> "$CONFIG_FILE" << 'EOF'
          CONFIG_KSU_SUSFS=y
          CONFIG_KSU_SUSFS_SUS_OVERLAYFS=y
          CONFIG_KSU_SUSFS_SUS_MAP=y
          CONFIG_KSU_SUSFS_SUS_PATH=y
          CONFIG_KSU_SUSFS_SUS_MOUNT=y
          CONFIG_KSU_SUSFS_SUS_KSTAT=y
          CONFIG_KSU_SUSFS_AUTO_ADD_SUS_KSU_DEFAULT_MOUNT=y
          CONFIG_KSU_SUSFS_AUTO_ADD_SUS_BIND_MOUNT=y
          CONFIG_KSU_SUSFS_TRY_UMOUNT=y
          CONFIG_KSU_SUSFS_AUTO_ADD_TRY_UMOUNT_FOR_BIND_MOUNT=y
          CONFIG_KSU_SUSFS_SPOOF_UNAME=y
          CONFIG_KSU_SUSFS_ENABLE_LOG=y
          CONFIG_KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS=y
          CONFIG_KSU_SUSFS_SPOOF_CMDLINE_OR_BOOTCONFIG=y
          CONFIG_KSU_SUSFS_OPEN_REDIRECT=y
          EOF
            echo "Successfully enabled all SUSFS features in $CONFIG_FILE."
          else
            echo "WARNING: su.config not found! SUSFS features were not modified."
          fi

      - name: Add Baseband Guard (BBG)
        run: |
          cd ${KERNEL_ROOT}
          
          echo "Setting up BBG from branch: ${{ github.event.inputs.BBG_BRANCH }}"
          # NOTE: Replace the URL below with the actual Baseband Guard repository you are using
          # git clone --depth=1 -b ${{ github.event.inputs.BBG_BRANCH }} https://github.com/your-bbg-repo/baseband_guard.git security/baseband_guard
          
          DEFCONFIG_FILE="arch/arm64/configs/${{ github.event.inputs.DEVICE }}_defconfig"
          
          if [ -f "$DEFCONFIG_FILE" ]; then
            echo "Injecting BBG and expanding log buffer..."
            echo "CONFIG_BBG=y" >> "$DEFCONFIG_FILE"
            echo "CONFIG_LOG_BUF_SHIFT=20" >> "$DEFCONFIG_FILE"
            echo 'CONFIG_LSM="landlock,lockdown,yama,loadpin,safesetid,integrity,selinux,smack,tomoyo,apparmor,bpf,baseband_guard"' >> "$DEFCONFIG_FILE"
            echo "Successfully injected BBG into $DEFCONFIG_FILE!"
          else
            echo "ERROR: Defconfig not found at $DEFCONFIG_FILE"
            exit 1
          fi

      - name: Build Kernel
        run: |
          cd ${KERNEL_ROOT}
          export PATH="${KERNEL_ROOT}/clang/bin:${PATH}"
          export ARCH=arm64
          export SUBARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          export CROSS_COMPILE_ARM32=arm-linux-gnueabi-
          export CC=clang
          
          make O=out ${{ github.event.inputs.DEVICE }}_defconfig
          make -j$(nproc --all) O=out \
                                CC=clang \
                                CROSS_COMPILE=aarch64-linux-gnu- \
                                CROSS_COMPILE_COMPAT=arm-linux-gnueabi- \
                                LLVM=1 LLVM_IAS=1

      - name: Package with AnyKernel3
        run: |
          cd ${{ github.workspace }}
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3.git AK3
          cp ${KERNEL_ROOT}/out/arch/arm64/boot/Image AK3/
          cd AK3
          
          sed -i "s/kernel.string=.*/kernel.string=M14-ReSukiSU-BBG/g" anykernel.sh
          sed -i "s/device.name1=.*/device.name1=${{ github.event.inputs.DEVICE }}/g" anykernel.sh
          
          zip -r9 ../M14_5G_Kernel_BBG.zip *

      - name: Upload Kernel Artifact
        uses: actions/upload-artifact@v4
        with:
          name: M14_5G_Kernel_BBG
          path: M14_5G_Kernel_BBG.zip
