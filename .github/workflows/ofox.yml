name: Build OrangeFox Recovery

on:
  workflow_dispatch:
    inputs:
      MANIFEST_BRANCH:
        description: 'OrangeFox Manifest Branch'
        required: true
        default: '12.1'
      DEVICE_TREE_URL:
        description: 'GitHub Repo URL of your Device Tree'
        required: true
        default: 'https://github.com/USERNAME/device_samsung_SM-M146B'
      DEVICE_TREE_BRANCH:
        description: 'Device Tree Branch'
        required: true
        default: 'main'
      DEVICE_PATH:
        description: 'Path of your device tree (e.g. device/samsung/SM-M146B)'
        required: true
        default: 'device/samsung/SM-M146B'
      DEVICE_NAME:
        description: 'Device Codename (e.g. SM-M146B)'
        required: true
        default: 'SM-M146B'
      BUILD_TARGET:
        description: 'Build Target'
        required: true
        default: 'recoveryimage'

jobs:
  build:
    name: Build OrangeFox by ${{ github.actor }}
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Clean up disk space
      uses: easimon/maximize-build-space@master
      with:
        root-reserve-mb: 8192
        swap-size-mb: 8192
        remove-dotnet: 'true'
        remove-android: 'true'
        remove-haskell: 'true'
        remove-codeql: 'true'
        remove-docker-images: 'true'

    - name: Set up Build Environment
      run: |
        sudo apt-get update
        sudo apt-get install -y git-core gnupg flex bison build-essential zip curl zlib1g-dev gcc-multilib g++-multilib libc6-dev-i386 lib32ncurses5-dev x11proto-core-dev libx11-dev lib32z1-dev libgl1-mesa-dev libxml2-utils xsltproc unzip fontconfig rsync bc ccache

    - name: Install Repo tool
      run: |
        mkdir -p ~/bin
        curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
        chmod a+x ~/bin/repo
        echo "$HOME/bin" >> $GITHUB_PATH

    - name: Sync OrangeFox Manifest
      run: |
        mkdir -p ~/orangefox
        cd ~/orangefox
        git config --global user.name "Builder"
        git config --global user.email "builder@github.com"
        git clone https://gitlab.com/OrangeFox/sync.git
        cd sync
        ./orangefox_sync.sh --branch ${{ github.event.inputs.MANIFEST_BRANCH }} --path ~/orangefox

    - name: Clone Device Tree
      run: |
        cd ~/orangefox
        git clone -b ${{ github.event.inputs.DEVICE_TREE_BRANCH }} ${{ github.event.inputs.DEVICE_TREE_URL }} ${{ github.event.inputs.DEVICE_PATH }}

    - name: Build OrangeFox
      run: |
        cd ~/orangefox
        export ALLOW_MISSING_DEPENDENCIES=true
        export LC_ALL="C"
        export FOX_BUILD_DEVICE=${{ github.event.inputs.DEVICE_NAME }}
        
        # Initialize build environment
        source build/envsetup.sh
        
        # Prep lunch and build (adjust 'twrp_' prefix if your tree uses 'omni_')
        lunch twrp_${{ github.event.inputs.DEVICE_NAME }}-eng
        mka ${{ github.event.inputs.BUILD_TARGET }}

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: OrangeFox-${{ github.event.inputs.DEVICE_NAME }}
        path: |
          ~/orangefox/out/target/product/${{ github.event.inputs.DEVICE_NAME }}/OrangeFox-*.zip
          ~/orangefox/out/target/product/${{ github.event.inputs.DEVICE_NAME }}/*.img
