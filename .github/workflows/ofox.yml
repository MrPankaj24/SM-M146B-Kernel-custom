name: Build OrangeFox - M14x

on:
  workflow_dispatch:

jobs:
  build:
    name: Build OrangeFox Recovery
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Clean up disk space
      uses: easimon/maximize-build-space@master
      with:
        root-reserve-mb: 8192
        swap-size-mb: 8192
        remove-dotnet: 'true'
        remove-android: 'true'
        remove-haskell: 'true'
        remove-codeql: 'true'
        remove-docker-images: 'true'

    - name: Set up Build Environment
      run: |
        sudo apt-get update
        sudo apt-get install -y git-core gnupg flex bison build-essential zip curl zlib1g-dev gcc-multilib g++-multilib libc6-dev-i386 lib32ncurses5-dev x11proto-core-dev libx11-dev lib32z1-dev libgl1-mesa-dev libxml2-utils xsltproc unzip fontconfig rsync bc ccache

    - name: Install Repo tool
      run: |
        mkdir -p ~/bin
        curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
        chmod a+x ~/bin/repo
        echo "$HOME/bin" >> $GITHUB_PATH

    - name: Sync OrangeFox 12.1 Manifest
      run: |
        mkdir -p ~/orangefox
        cd ~/orangefox
        git config --global user.name "Builder"
        git config --global user.email "builder@github.com"
        git clone https://gitlab.com/OrangeFox/sync.git
        cd sync
        ./orangefox_sync.sh --branch 12.1 --path ~/orangefox

    - name: Clone Device Trees
      run: |
        cd ~/orangefox
        # 1. Clone your specific M14x tree
        git clone -b twrp-12.1 https://github.com/MrPankaj24/twrp_device_samsung_m14x device/samsung/m14x
        
        # 2. Clone the required Exynos 1330 common tree (handles the inherit-product in your device.mk)
        git clone -b twrp-12.1 https://github.com/AshutoshCodeSpace/twrp_device_samsung_s5e8535-common device/samsung/s5e8535-common

    - name: Build OrangeFox Recovery
      run: |
        cd ~/orangefox
        
        # Core build variables
        export ALLOW_MISSING_DEPENDENCIES=true
        export LC_ALL="C"
        export FOX_BUILD_DEVICE="m14x"
        
        # OrangeFox features and partition variables
        export FOX_RECOVERY_INSTALL_PARTITION="/dev/block/by-name/recovery"
        export FOX_RECOVERY_SYSTEM_PARTITION="/dev/block/by-name/system"
        export FOX_RECOVERY_VENDOR_PARTITION="/dev/block/by-name/vendor"
        export FOX_RECOVERY_BOOT_PARTITION="/dev/block/by-name/boot"
        export FOX_USE_TWRP_RECOVERY_IMAGE_BUILDER=1
        export OF_USE_GREEN_LED=0
        export OF_FLASHLIGHT_ENABLE=1
        
        # Initialize and build
        source build/envsetup.sh
        lunch twrp_m14x-eng
        mka recoveryimage

    - name: Upload Flashable Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: OrangeFox-m14x-Recovery
        path: |
          ~/orangefox/out/target/product/m14x/OrangeFox-*.zip
          ~/orangefox/out/target/product/m14x/recovery.img
